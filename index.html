<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>苹果打字大作战 - 追踪箭矢版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(to bottom, #87CEEB, #E0F7FA);
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        #game-container {
            position: relative;
            width: 600px;
            height: 500px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            border: 2px solid #fff;
            overflow: hidden;
        }
        .apple {
            position: absolute;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            z-index: 2;
        }
        #archer {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 40px;
            z-index: 3;
            transition: transform 0.2s ease;
        }
        /* 箭矢样式 */
        .arrow {
            position: absolute;
            width: 6px;
            height: 30px;
            background: linear-gradient(to top, #8B4513, #D2B48C);
            border-radius: 2px;
            z-index: 1;
            transform-origin: bottom center; /* 旋转中心在箭尾 */
        }
        .arrow::after {
            content: '';
            position: absolute;
            top: -8px;
            left: -3px;
            width: 0;
            height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 10px solid #D2B48C;
        }
        #ui-layer {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 18px;
            font-weight: bold;
            z-index: 5;
        }
        #start-screen, #end-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
            transition: background 0.2s;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <span>得分: <span id="score">0</span></span>
        <span>时间: <span id="timer">60</span>s</span>
    </div>
    <div id="archer">🏹</div>
    
    <div id="start-screen">
        <h1>🍎 苹果打字大作战</h1>
        <p>按下对应字母键射击苹果！坚持60秒即可获胜！</p>
        <button onclick="startGame()">开始游戏</button>
    </div>

    <div id="end-screen" style="display:none;">
        <h1 id="end-title">游戏结束</h1>
        <p>最终得分: <span id="final-score">0</span></p>
        <button onclick="location.reload()">再玩一次</button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const archer = document.getElementById('archer');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const startScreen = document.getElementById('start-screen');
    const endScreen = document.getElementById('end-screen');
    const endTitle = document.getElementById('end-title');
    const finalScoreEl = document.getElementById('final-score');

    let score = 0;
    let timeLeft = 60;
    let gameInterval, spawnInterval;
    let apples = [];
    let arrows = []; // 存储所有飞行中的箭矢

    function startGame() {
        startScreen.style.display = 'none';
        endScreen.style.display = 'none';
        score = 0;
        timeLeft = 60;
        scoreEl.textContent = score;
        timerEl.textContent = timeLeft;
        apples = [];
        arrows = [];
        
        gameInterval = setInterval(() => {
            timeLeft--;
            timerEl.textContent = timeLeft;
            if (timeLeft <= 0) endGame(true);
        }, 1000);

        spawnInterval = setInterval(spawnApple, 1000);
    }

    function spawnApple() {
        const letter = String.fromCharCode(65 + Math.floor(Math.random() * 26));
        const apple = document.createElement('div');
        apple.className = 'apple';
        apple.textContent = letter;
        apple.style.left = Math.random() * 530 + 'px';
        apple.style.top = '-50px';
        container.appendChild(apple);
        
        const appleObj = { el: apple, x: parseFloat(apple.style.left), y: -50, letter: letter };
        apples.push(appleObj);
    }

    // 主游戏循环：处理苹果下落和箭矢追踪
    function gameLoop() {
        // 1. 更新苹果位置
        for (let i = apples.length - 1; i >= 0; i--) {
            const a = apples[i];
            a.y += 3; 
            a.el.style.top = a.y + 'px';
            
            if (a.y > 500) {
                a.el.remove();
                apples.splice(i, 1);
            }
        }

        // 2. 更新箭矢轨迹
        for (let i = arrows.length - 1; i >= 0; i--) {
            const arrow = arrows[i];
            
            // 如果目标苹果已经被其他箭射中或掉出屏幕，清除箭矢
            if (!apples.includes(arrow.target)) {
                arrow.el.remove();
                arrows.splice(i, 1);
                continue;
            }

            // 计算箭矢中心点到苹果中心点的向量
            const dx = (arrow.target.x + 25) - arrow.x;
            const dy = (arrow.target.y + 25) - arrow.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // 命中判定
            if (distance < 20) {
                arrow.el.remove();
                arrow.target.el.style.transform = 'scale(0)';
                setTimeout(() => arrow.target.el.remove(), 100);
                
                const index = apples.indexOf(arrow.target);
                if (index > -1) apples.splice(index, 1);
                
                score += 10;
                scoreEl.textContent = score;
                arrows.splice(i, 1);
                continue;
            }

            // 物理加速移动
            arrow.speed += 0.5; 
            const moveX = (dx / distance) * arrow.speed;
            const moveY = (dy / distance) * arrow.speed;
            
            arrow.x += moveX;
            arrow.y += moveY;

            // 计算角度并旋转箭矢 (atan2 返回弧度，转为角度)
            const angle = Math.atan2(dy, dx) * (180 / Math.PI);
            
            // 更新 DOM 样式
            arrow.el.style.left = arrow.x + 'px';
            arrow.el.style.top = arrow.y + 'px';
            arrow.el.style.transform = `rotate(${angle + 90}deg)`; // +90度是因为箭矢DOM默认是竖直向上的
        }

        requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);

    // 射击逻辑
    function shootArrow(targetApple) {
        const arrow = document.createElement('div');
        arrow.className = 'arrow';
        container.appendChild(arrow);

        // 初始化箭矢状态
        const arrowObj = {
            el: arrow,
            x: 300, // 弓箭手中心
            y: 450, // 弓箭手上方
            speed: 8, // 初始速度
            target: targetApple
        };
        arrows.push(arrowObj);

        // 弓箭手动态瞄准
        if (targetApple.x + 25 < 300) {
            archer.style.transform = 'translateX(-50%) scaleX(-1)';
        } else {
            archer.style.transform = 'translateX(-50%) scaleX(1)';
        }
    }

    window.addEventListener('keydown', (e) => {
        if (timeLeft <= 0) return;
        const key = e.key.toUpperCase();
        
        // 寻找最靠下的匹配苹果
        let target = null;
        let maxY = -1;
        for (const a of apples) {
            if (a.letter === key && a.y > maxY) {
                maxY = a.y;
                target = a;
            }
        }

        if (target) shootArrow(target);
    });

    function endGame(win) {
        clearInterval(gameInterval);
        clearInterval(spawnInterval);
        endScreen.style.display = 'flex';
        finalScoreEl.textContent = score;
        endTitle.textContent = win ? "🎉 恭喜获胜！" : "💥 游戏结束";
    }
    
    // 在 gameLoop 函数外部定义粒子数组
    let particles = [];

    // 创建粒子爆炸效果
    function createExplosion(x, y) {
        for (let i = 0; i < 15; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = '6px';
            particle.style.height = '6px';
            particle.style.backgroundColor = '#FF4500';
            particle.style.borderRadius = '50%';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            particle.style.pointerEvents = 'none';
            document.getElementById('game-container').appendChild(particle);

            // 随机速度和方向
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 3;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;

            particles.push({
                el: particle,
                x: x,
                y: y,
                vx: vx,
                vy: vy,
                life: 1.0 // 生命值，用于控制透明度
            });
        }
    }

    // 在游戏主循环中更新粒子
    function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02; // 每帧减少生命值

            if (p.life <= 0) {
                p.el.remove();
                particles.splice(i, 1);
            } else {
                p.el.style.left = p.x + 'px';
                p.el.style.top = p.y + 'px';
                p.el.style.opacity = p.life;
            }
        }
    }

// 在箭矢命中苹果的回调中调用 createExplosion(appleX, appleY)
</script>
</body>
</html>
