<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快乐学习乐园</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <h1><i class="fas fa-star"></i> 快乐学习乐园</h1>
            <p class="header-desc">探索、学习、创造！</p>
        </div>
    </header>

    <main>
        <!-- ========== 游戏 ========== -->
        <section class="category">
            <h2 class="cat-title"><i class="fas fa-gamepad"></i> 游戏</h2>
            <div class="app-row">
                <a href="games/apple-typing/" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(135deg, #ff6b6b, #ee5a24);">
                        <i class="fas fa-apple-alt"></i>
                    </div>
                    <span class="app-name">苹果打字</span>
                </a>

                <a href="games/number-puzzle/" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(135deg, #0abde3, #48dbfb);">
                        <i class="fas fa-puzzle-piece"></i>
                    </div>
                    <span class="app-name">数字拼图</span>
                </a>

                <a href="games/cow-jump/" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(135deg, #ff9ff3, #f368e0);">
                        <i class="fas fa-cow"></i>
                    </div>
                    <span class="app-name">小牛跳跳乐</span>
                </a>

                <a href="games/animal-puzzle/" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(135deg, #1dd1a1, #10ac84);">
                        <i class="fas fa-paw"></i>
                    </div>
                    <span class="app-name">拼拼图</span>
                </a>
            </div>
        </section>

        <!-- ========== 学习 ========== -->
        <section class="category">
            <h2 class="cat-title"><i class="fas fa-book"></i> 学习</h2>
            <div class="app-row">
                <a href="games/combined-quiz/" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(135deg, #0f0c29, #302b63);">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <span class="app-name">综合练习</span>
                </a>

                <a href="games/geography/" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(135deg, #fd79a8, #e84393);">
                        <i class="fas fa-globe-asia"></i>
                    </div>
                    <span class="app-name">世界地理探险</span>
                </a>
            </div>
        </section>

        <!-- ========== 创意 ========== -->
        <section class="category">
            <h2 class="cat-title"><i class="fas fa-palette"></i> 创意</h2>
            <div class="app-row">
                <a href="games/drawing-board/" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(135deg, #fdcb6e, #e17055);">
                        <i class="fas fa-paint-brush"></i>
                    </div>
                    <span class="app-name">彩色绘画板</span>
                </a>

                <a href="games/music-maker/" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(135deg, #81ecec, #00cec9);">
                        <i class="fas fa-music"></i>
                    </div>
                    <span class="app-name">音乐制作器</span>
                </a>
            </div>
        </section>

        <!-- ========== 其他 ========== -->
        <section class="category">
            <h2 class="cat-title"><i class="fas fa-cubes"></i> 其他</h2>
            <div class="app-row">
                <a href="games/lucky-wheel/" class="app-card">
                    <div class="app-icon" style="background: linear-gradient(135deg, #ffeaa7, #fdcb6e);">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <span class="app-name">幸运大转盘</span>
                </a>
            </div>
        </section>
    </main>

    <footer>
        <p>快乐学习乐园 &copy; 2026</p>
    </footer>
</body>
</html>
