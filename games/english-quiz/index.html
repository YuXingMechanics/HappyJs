<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语小测验 - 快乐学习乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #gameContainer {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        #gameTitle {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #f5576c;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border-radius: 16px;
            color: white;
        }
        #topBarLeft { display: flex; gap: 10px; }
        #topBarLeft button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        #topBarLeft button:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        #stats {
            display: flex;
            gap: 20px;
            font-size: 16px;
            font-weight: 600;
        }
        #startOverlay { text-align: center; padding: 10px 0; }

        /* ===== 模式标签 ===== */
        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .mode-tab {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #f5f7fa;
            color: #666;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-tab:hover { border-color: #f093fb; color: #f5576c; }
        .mode-tab.active {
            border-color: #f5576c;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        /* ===== 模式面板 ===== */
        .mode-panel { padding: 5px 0; }
        .mode-panel h2 {
            color: #f5576c;
            font-size: 20px;
            margin-bottom: 16px;
        }

        /* ===== 设置行 ===== */
        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
            text-align: left;
        }
        .setting-row > span {
            font-size: 15px;
            font-weight: 700;
            color: #555;
        }

        /* ===== 预设按钮组 ===== */
        .preset-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .preset-btn {
            padding: 10px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            color: #555;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover { border-color: #f093fb; color: #f5576c; }
        .preset-btn.active {
            border-color: #f5576c;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        /* ===== 自定义输入框 ===== */
        .challenge-input {
            width: 80px;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        .challenge-input:focus { border-color: #f5576c; }

        /* ===== 开始按钮 ===== */
        .start-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            transition: all 0.3s;
            margin-top: 8px;
        }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(245,87,108,0.4); }

        /* ===== 分类选择（纵向） ===== */
        .cat-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .cat-btn {
            padding: 16px 20px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .cat-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .cat-btn:active { transform: translateY(0); }
        .cat-1 { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .cat-2 { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .cat-3 { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #333; }
        .cat-4 { background: linear-gradient(135deg, #fa709a, #fee140); color: #333; }
        .cat-5 { background: linear-gradient(135deg, #0abde3, #48dbfb); }
        .cat-6 { background: linear-gradient(135deg, #ff9ff3, #f368e0); }
        .cat-7 { background: linear-gradient(135deg, #00b894, #00cec9); }

        /* ===== TF判断模式（只显示2个按钮） ===== */
        #answerArea.tf-mode {
            grid-template-columns: repeat(2, 1fr);
        }
        #answerArea.tf-mode .answer-btn {
            font-size: 28px;
            padding: 25px 20px;
        }
        #answerArea.tf-mode .answer-btn:nth-child(3),
        #answerArea.tf-mode .answer-btn:nth-child(4) {
            display: none;
        }

        /* ===== 横向分类按钮（挑战/计时赛用） ===== */
        .cat-select-horiz {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .cat-select-horiz .preset-btn {
            flex: 1;
            min-width: 100px;
            padding: 12px 10px;
            text-align: center;
        }

        /* ===== 计时器显示 ===== */
        .timer-display {
            font-size: 14px;
            font-weight: 700;
            color: #f5576c;
            text-align: center;
            margin-bottom: 12px;
        }

        /* ===== 说明文字 ===== */
        .mode-desc {
            font-size: 15px;
            color: #888;
            text-align: center;
            margin-bottom: 16px;
            line-height: 1.6;
        }

        /* ===== 难度标签颜色 ===== */
        .diff-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .diff-tag-1 { background: #dfe6e9; color: #636e72; }
        .diff-tag-2 { background: #ffeaa7; color: #d68910; }
        .diff-tag-3 { background: #fab1a0; color: #c0392b; }

        /* ===== 游戏区域 ===== */
        #quizArea { display: none; }
        #catInfo {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            padding: 8px;
            background: #f5f7fa;
            border-radius: 10px;
        }
        #questionArea {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 20px;
            margin-bottom: 25px;
            min-height: 120px;
        }
        #questionNumber { font-size: 14px; color: #666; margin-bottom: 10px; }
        #questionLabel {
            font-size: 13px;
            color: #999;
            margin-bottom: 6px;
        }
        #questionText {
            font-size: 32px;
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 8px;
            word-break: break-word;
        }
        #questionHint {
            font-size: 14px;
            color: #636e72;
            margin-top: 6px;
        }
        #answerArea {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .answer-btn {
            padding: 18px 10px;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            word-break: break-word;
        }
        .answer-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,87,108,0.3); }
        .answer-btn:active { transform: translateY(0); }
        .answer-btn.correct { background: linear-gradient(135deg, #1dd1a1, #10ac84); }
        .answer-btn.wrong { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        #feedback {
            text-align: center;
            margin-top: 20px;
            font-size: 20px;
            font-weight: 700;
            min-height: 30px;
        }
        #feedback.correct { color: #1dd1a1; }
        #feedback.wrong { color: #ff6b6b; }

        /* ===== 结果弹窗 ===== */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        #overlay.show { opacity: 1; pointer-events: auto; }
        #overlayContent {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        #overlayContent h2 { color: #f5576c; font-size: 32px; margin-bottom: 20px; }
        #finalStats { font-size: 18px; color: #666; margin-bottom: 30px; line-height: 1.8; }
        #overlayContent button {
            padding: 15px 40px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            transition: all 0.3s;
        }
        #overlayContent button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(245,87,108,0.4); }

        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            animation: fall linear infinite;
            z-index: 9999;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            #gameContainer { padding: 20px; }
            #questionText { font-size: 26px; }
            .answer-btn { padding: 14px 8px; font-size: 17px; }
            .cat-btn { padding: 13px 16px; font-size: 15px; }
            .mode-tab { font-size: 13px; padding: 10px 6px; }
            .preset-btn { font-size: 12px; padding: 8px 10px; }
            .cat-select-horiz .preset-btn { min-width: 70px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameTitle">📖 英语小测验</div>

        <div id="topBar">
            <div id="topBarLeft">
                <button onclick="location.href='../../'">🏠</button>
                <button onclick="restartGame()">🔄 重新开始</button>
            </div>
            <div id="stats">
                <span>📝 <span id="currentQ">1</span> / <span id="totalQ">10</span></span>
                <span>✅ <span id="score">0</span></span>
                <span>⏱️ <span id="timer">0</span>s</span>
            </div>
        </div>

        <div id="startOverlay">
            <!-- 模式标签 -->
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="study" onclick="switchMode('study')">📖 学习模式</button>
                <button class="mode-tab" data-mode="challenge" onclick="switchMode('challenge')">🏆 挑战赛</button>
                <button class="mode-tab" data-mode="timer" onclick="switchMode('timer')">⏱️ 计时赛</button>
            </div>

            <!-- 学习模式面板 -->
            <div class="mode-panel" id="panel-study">
                <h2>📚 选择分类与难度</h2>
                <div class="cat-select">
                    <button class="cat-btn cat-1" onclick="startStudy('spell')">🔤 单词拼写</button>
                    <button class="cat-btn cat-2" onclick="startStudy('translate')">🌏 英译中</button>
                    <button class="cat-btn cat-3" onclick="startStudy('emoji')">🎨 看图识词</button>
                    <button class="cat-btn cat-4" onclick="startStudy('sentence')">📜 读句子</button>
                    <button class="cat-btn cat-5" onclick="startStudy('response')">💬 应答句</button>
                    <button class="cat-btn cat-6" onclick="startStudy('reading')">📖 阅读理解</button>
                    <button class="cat-btn cat-7" onclick="startStudy('tfreading')">✅ TF判断</button>
                </div>
                <div class="setting-row">
                    <span>难度：</span>
                    <div class="preset-btns">
                        <button class="preset-btn active" data-diff="1" onclick="selectStudyDiff(1, this)">🍭 简单</button>
                        <button class="preset-btn" data-diff="2" onclick="selectStudyDiff(2, this)">🍫 普通</button>
                        <button class="preset-btn" data-diff="3" onclick="selectStudyDiff(3, this)">🔥 困难</button>
                    </div>
                </div>
            </div>

            <!-- 挑战赛面板 -->
            <div class="mode-panel" id="panel-challenge" style="display:none">
                <h2>🏆 挑战赛设置</h2>
                <div class="setting-row">
                    <span>分类：</span>
                    <div class="cat-select-horiz preset-btns">
                        <button class="preset-btn active" data-cat="spell" onclick="selectChallengeCat('spell', this)">🔤 单词拼写</button>
                        <button class="preset-btn" data-cat="translate" onclick="selectChallengeCat('translate', this)">🌏 英译中</button>
                        <button class="preset-btn" data-cat="emoji" onclick="selectChallengeCat('emoji', this)">🎨 看图识词</button>
                        <button class="preset-btn" data-cat="sentence" onclick="selectChallengeCat('sentence', this)">📜 读句子</button>
                        <button class="preset-btn" data-cat="response" onclick="selectChallengeCat('response', this)">💬 应答句</button>
                        <button class="preset-btn" data-cat="reading" onclick="selectChallengeCat('reading', this)">📖 阅读理解</button>
                        <button class="preset-btn" data-cat="tfreading" onclick="selectChallengeCat('tfreading', this)">✅ TF判断</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span>难度：</span>
                    <div class="preset-btns">
                        <button class="preset-btn active" data-diff="1" onclick="selectChallengeDiff(1, this)">🍭 简单</button>
                        <button class="preset-btn" data-diff="2" onclick="selectChallengeDiff(2, this)">🍫 普通</button>
                        <button class="preset-btn" data-diff="3" onclick="selectChallengeDiff(3, this)">🔥 困难</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span>题目数量：</span>
                    <div class="preset-btns">
                        <button class="preset-btn" data-count="5" onclick="selectChallengeCount(5, this)">5</button>
                        <button class="preset-btn active" data-count="10" onclick="selectChallengeCount(10, this)">10</button>
                        <button class="preset-btn" data-count="15" onclick="selectChallengeCount(15, this)">15</button>
                        <button class="preset-btn" data-count="20" onclick="selectChallengeCount(20, this)">20</button>
                        <input class="challenge-input" type="number" min="1" max="50" placeholder="自定义" oninput="onChallengeCountInput(this)">
                    </div>
                </div>
                <div class="setting-row">
                    <span>时间限制（秒）：</span>
                    <div class="preset-btns">
                        <button class="preset-btn" data-time="30" onclick="selectChallengeTime(30, this)">30</button>
                        <button class="preset-btn active" data-time="60" onclick="selectChallengeTime(60, this)">60</button>
                        <button class="preset-btn" data-time="90" onclick="selectChallengeTime(90, this)">90</button>
                        <button class="preset-btn" data-time="120" onclick="selectChallengeTime(120, this)">120</button>
                        <input class="challenge-input" type="number" min="10" max="600" placeholder="自定义" oninput="onChallengeTimeInput(this)">
                    </div>
                </div>
                <button class="start-btn" onclick="startChallenge()">🚀 开始挑战</button>
            </div>

            <!-- 计时赛面板 -->
            <div class="mode-panel" id="panel-timer" style="display:none">
                <h2>⏱️ 计时赛设置</h2>
                <div class="setting-row">
                    <span>分类：</span>
                    <div class="cat-select-horiz preset-btns">
                        <button class="preset-btn active" data-cat="spell" onclick="selectTimerCat('spell', this)">🔤 单词拼写</button>
                        <button class="preset-btn" data-cat="translate" onclick="selectTimerCat('translate', this)">🌏 英译中</button>
                        <button class="preset-btn" data-cat="emoji" onclick="selectTimerCat('emoji', this)">🎨 看图识词</button>
                        <button class="preset-btn" data-cat="sentence" onclick="selectTimerCat('sentence', this)">📜 读句子</button>
                        <button class="preset-btn" data-cat="response" onclick="selectTimerCat('response', this)">💬 应答句</button>
                        <button class="preset-btn" data-cat="reading" onclick="selectTimerCat('reading', this)">📖 阅读理解</button>
                        <button class="preset-btn" data-cat="tfreading" onclick="selectTimerCat('tfreading', this)">✅ TF判断</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span>难度：</span>
                    <div class="preset-btns">
                        <button class="preset-btn active" data-diff="1" onclick="selectTimerDiff(1, this)">🍭 简单</button>
                        <button class="preset-btn" data-diff="2" onclick="selectTimerDiff(2, this)">🍫 普通</button>
                        <button class="preset-btn" data-diff="3" onclick="selectTimerDiff(3, this)">🔥 困难</button>
                    </div>
                </div>
                <p class="mode-desc">⚡ 尽可能快地答题！答完所有题目即结束，用时越短越好！</p>
                <button class="start-btn" onclick="startTimerRace()">⏱️ 开始计时赛</button>
            </div>
        </div>

        <div id="quizArea">
            <div id="catInfo"></div>
            <div id="timerDisplay" class="timer-display" style="display:none"></div>
            <div id="questionArea">
                <div id="questionNumber">第 1 题</div>
                <div id="questionLabel"></div>
                <div id="questionText"></div>
                <div id="questionHint"></div>
            </div>
            <div id="answerArea">
                <button class="answer-btn" onclick="checkAnswer(0)">A</button>
                <button class="answer-btn" onclick="checkAnswer(1)">B</button>
                <button class="answer-btn" onclick="checkAnswer(2)">C</button>
                <button class="answer-btn" onclick="checkAnswer(3)">D</button>
            </div>
            <div id="feedback"></div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlayContent">
            <h2 id="resultTitle">🎉 挑战完成！</h2>
            <div id="finalStats">
                分类：<span id="finalCat"></span><br>
                得分：<span id="finalScore">0</span> / <span id="finalTotal">10</span><br>
                用时：<span id="finalTime">0</span> 秒<br>
                正确率：<span id="finalPercent">0%</span>
            </div>
            <button onclick="restartGame()">🔄 再来一次</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  数据
        // ============================================================
        const questionBank = {
            // -------- 单词拼写 --------
            spell: [
                { q: '苹果', hint: '🍎 一种水果', opts: ['apple', 'aple', 'appel', 'aplle'], ans: 0, diff: 1 },
                { q: '小猫', hint: '🐱 宠物', opts: ['ket', 'cat', 'kat', 'cet'], ans: 1, diff: 1 },
                { q: '小狗', hint: '🐕 人类最好的朋友', opts: ['dawg', 'doj', 'dog', 'dok'], ans: 2, diff: 1 },
                { q: '书', hint: '📖 用来阅读', opts: ['buk', 'bok', 'book', 'boke'], ans: 2, diff: 1 },
                { q: '汽车', hint: '🚗 交通工具', opts: ['car', 'kar', 'carr', 'karr'], ans: 0, diff: 1 },
                { q: '鱼', hint: '🐟 在水里游', opts: ['fesh', 'fish', 'fsh', 'fisch'], ans: 1, diff: 1 },
                { q: '鸟', hint: '🐦 在天上飞', opts: ['berd', 'burd', 'bird', 'berd'], ans: 2, diff: 1 },
                { q: '太阳', hint: '☀️ 天上的恒星', opts: ['son', 'sun', 'sunn', 'san'], ans: 1, diff: 1 },
                { q: '月亮', hint: '🌙 晚上的天空', opts: ['mun', 'mon', 'moon', 'moone'], ans: 2, diff: 1 },
                { q: '花', hint: '🌸 植物的一部分', opts: ['flor', 'flawer', 'flower', 'floure'], ans: 2, diff: 2 },
                { q: '树', hint: '🌳 高大的植物', opts: ['tre', 'tree', 'trea', 'trey'], ans: 1, diff: 2 },
                { q: '水', hint: '💧 透明的液体', opts: ['wter', 'water', 'watar', 'watter'], ans: 1, diff: 2 },
                { q: '学校', hint: '🏫 学习的地方', opts: ['skool', 'scholl', 'school', 'scool'], ans: 2, diff: 2 },
                { q: '铅笔', hint: '✏️ 写字用的', opts: ['pencil', 'pensil', 'pencel', 'pensle'], ans: 0, diff: 2 },
                { q: '椅子', hint: '🪑 用来坐', opts: ['chare', 'chear', 'cheir', 'chair'], ans: 3, diff: 2 },

        // ============================================================

        const QuizAudio = (() => {
            let ctx = null;
            function init() {
                if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
            }
            function playTone(freq, type, duration) {
                init();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            }
            return {
                init() { init(); },
                correct() {
                    playTone(600, 'sine', 0.1);
                    setTimeout(() => playTone(800, 'sine', 0.1), 100);
                    setTimeout(() => playTone(1000, 'sine', 0.2), 200);
                },
                wrong() {
                    playTone(300, 'sawtooth', 0.3);
                    setTimeout(() => playTone(250, 'sawtooth', 0.3), 150);
                },
                victory() {
                    const notes = [523, 659, 784, 1047];
                    notes.forEach((n, i) => setTimeout(() => playTone(n, 'sine', 0.3), i * 150));
                }
            };
        })();

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function filterQuestions(cat, diff) {
            return questionBank[cat].filter(q => q.diff === diff);
        }

        function preGenerateQuestions(cat, diff, count) {
            const filtered = filterQuestions(cat, diff);
            const shuffled = shuffleArray([...filtered]);
            return shuffled.slice(0, Math.min(count, shuffled.length));
        }

        function checkAnswer(index) {
            if (!isPlaying) return;
            answerButtons.forEach(btn => btn.disabled = true);

            if (index === currentAnswer) {
                answerButtons[index].classList.add('correct');
                feedback.textContent = '✅ 回答正确！太棒了！';
                feedback.classList.add('correct');
                score++;
                scoreEl.textContent = score;
                QuizAudio.correct();
            } else {
                answerButtons[index].classList.add('wrong');
                feedback.textContent = '❌ 回答错误！正确答案是：' + currentQuestions[currentQuestion].opts[currentAnswer];
                feedback.classList.add('wrong');
                QuizAudio.wrong();
                answerButtons[currentAnswer].classList.add('correct');
            }

            currentQuestion++;
            setTimeout(() => {
                displayQuestion();
            }, 1200);
        }

        // ============================================================
        //  显示结果
        // ============================================================
        function showResults() {
            clearAllIntervals();
            QuizAudio.victory();

            const totalQ = currentQuestions.length;
            const correctRate = Math.round((score / totalQ) * 100);

            if (gameMode === 'challenge') {
                resultTitle.textContent = '🏆 挑战结束！';
                finalCat.textContent = catNames[category] + ' | ' + diffNames[challengeDiff];
                finalScore.textContent = score;
                finalTotal.textContent = totalQ;
                finalTime.textContent = challengeTimeLimit - countdownValue;
                finalPercent.textContent = correctRate + '%';
            } else if (gameMode === 'timer') {
                resultTitle.textContent = '⏱️ 计时完成！';
                finalCat.textContent = catNames[category] + ' | ' + diffNames[timerDiff];
                finalScore.textContent = score;
                finalTotal.textContent = totalQ;
                finalTime.textContent = timer;
                finalPercent.textContent = correctRate + '%';
            } else {
                resultTitle.textContent = '🎉 学习完成！';
                finalCat.textContent = catNames[category] + ' | ' + diffNames[studyDifficulty];
                finalScore.textContent = score;
                finalTotal.textContent = totalQ;
                finalTime.textContent = timer;
                finalPercent.textContent = correctRate + '%';
            }

            overlay.classList.add('show');
            launchConfetti();
        }

        // ============================================================
        //  重新开始 / 返回起始界面
        // ============================================================
        function restartGame() {
            clearAllIntervals();
            overlay.classList.remove('show');
            startOverlay.style.display = 'block';
            quizArea.style.display = 'none';
            timerDisplay.style.display = 'none';
            answerArea.classList.remove('tf-mode');
            currentQuestion = 0;
            score = 0;
            timer = 0;
            countdownValue = 0;
            isPlaying = false;
            // 重置模式标签到学习模式
            switchMode('study');
        }

        // ============================================================
        //  五彩纸屑
        // ============================================================
        function launchConfetti() {
            const colors = ['#FF6B6B', '#FFD700', '#48DBFB', '#FF9FF3', '#54a0ff', '#00d2d3', '#f8a5c2', '#FFA500', '#38ef7d'];
            for (let i = 0; i < 80; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                const size = 4 + Math.random() * 6;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.animationDuration = (3 + Math.random() * 3) + 's';
                el.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(el);
            }
            setTimeout(() => {
                document.querySelectorAll('.confetti').forEach(el => el.remove());
            }, 6000);
        }
    </script>
</body>
</html>
