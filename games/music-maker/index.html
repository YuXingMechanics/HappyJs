<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎵 音乐制作器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .app {
            max-width: 700px;
            width: 100%;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 24px 32px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            margin-top: 10px;
        }

        /* ===== Top Toolbar ===== */
        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .back-link {
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 16px;
            color: #7c5cbf;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(124,92,191,0.10);
            transition: background 0.2s;
        }
        .back-link:hover {
            background: rgba(124,92,191,0.20);
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            color: #5b3a8c;
            letter-spacing: 1px;
        }

        /* ===== Drum Pads ===== */
        .drum-section {
            margin-bottom: 28px;
        }

        .section-label {
            font-size: 14px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .drum-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .drum-pad {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 18px;
            color: #fff;
            border: none;
            border-radius: 20px;
            padding: 24px 12px;
            cursor: pointer;
            transition: transform 0.08s, box-shadow 0.08s;
            box-shadow: 0 6px 0 rgba(0,0,0,0.18);
            position: relative;
            touch-action: manipulation;
        }

        .drum-pad:active,
        .drum-pad.active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.18);
        }

        .drum-pad .label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            opacity: 0.9;
            margin-top: 4px;
        }

        .drum-pad.kick  { background: linear-gradient(135deg, #FF6B6B, #ee5a24); }
        .drum-pad.snare { background: linear-gradient(135deg, #48DBFB, #0abde3); }
        .drum-pad.cymbal{ background: linear-gradient(135deg, #FFEAA7, #fdcb6e); color: #6c5b1f; }
        .drum-pad.clap  { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }

        /* ===== Piano ===== */
        .piano-section {
            margin-bottom: 28px;
        }

        .piano-container {
            position: relative;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
            height: 180px;
        }

        .white-keys {
            display: flex;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 160px;
            gap: 4px;
        }

        .white-key {
            flex: 1;
            background: linear-gradient(180deg, #fafafa 0%, #f0f0f0 100%);
            border: 2px solid #ddd;
            border-radius: 0 0 12px 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            font-weight: 700;
            color: #999;
            transition: background 0.06s;
            touch-action: manipulation;
        }

        .white-key:active,
        .white-key.active {
            background: linear-gradient(180deg, #e8f0fe 0%, #d0e0fd 100%);
            border-color: #b0c4de;
        }

        .black-keys {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 110px;
            pointer-events: none;
            padding: 0 2px;
        }

        .black-key {
            position: absolute;
            width: 44px;
            height: 110px;
            background: linear-gradient(180deg, #4a4a5a 0%, #2d2d3a 100%);
            border: none;
            border-radius: 0 0 10px 10px;
            cursor: pointer;
            pointer-events: auto;
            font-family: 'Nunito', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 8px;
            transition: background 0.06s;
            touch-action: manipulation;
            z-index: 2;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .black-key:active,
        .black-key.active {
            background: linear-gradient(180deg, #5a5a7a 0%, #3d3d5a 100%);
            height: 105px;
        }

        .black-key .note-label {
            font-size: 9px;
            opacity: 0.6;
        }

        /* ===== Controls ===== */
        .controls {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .ctrl-btn {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 16px;
            padding: 14px 32px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ctrl-btn:active {
            transform: scale(0.95);
        }

        .ctrl-btn.record {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
            box-shadow: 0 4px 15px rgba(238,90,36,0.35);
        }

        .ctrl-btn.record.recording {
            background: linear-gradient(135deg, #c0392b, #96281b);
            box-shadow: 0 0 0 0 rgba(238,90,36,0.5);
            animation: pulse-record 1s infinite;
        }

        @keyframes pulse-record {
            0%   { box-shadow: 0 0 0 0 rgba(238,90,36,0.5); }
            70%  { box-shadow: 0 0 0 12px rgba(238,90,36,0); }
            100% { box-shadow: 0 0 0 0 rgba(238,90,36,0); }
        }

        .ctrl-btn.play {
            background: linear-gradient(135deg, #48DBFB, #0abde3);
            color: #fff;
            box-shadow: 0 4px 15px rgba(10,189,227,0.35);
        }

        .ctrl-btn.play.playing {
            background: linear-gradient(135deg, #0abde3, #0984e3);
        }

        .ctrl-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status-text {
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: #888;
            text-align: center;
            margin-bottom: 12px;
            min-height: 24px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .app { padding: 16px; border-radius: 24px; }
            .title { font-size: 20px; }
            .drum-pad { padding: 18px 8px; font-size: 16px; }
            .piano-container { height: 160px; }
            .white-keys { height: 140px; }
            .white-key { font-size: 10px; border-radius: 0 0 10px 10px; }
            .black-key { width: 36px; height: 95px; }
            .black-key:active,
            .black-key.active { height: 90px; }
            .black-keys { height: 95px; }
            .ctrl-btn { padding: 12px 20px; font-size: 14px; }
        }

        @media (max-width: 400px) {
            .black-key { width: 32px; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app">
        <!-- Toolbar -->
        <div class="toolbar">
            <a class="back-link" href="../../index.html">← 返回</a>
            <span class="title">🎵 音乐制作器</span>
            <span style="width:70px"></span>
        </div>

        <!-- Drum Pads -->
        <div class="drum-section">
            <div class="section-label">🥁 鼓垫</div>
            <div class="drum-grid">
                <button class="drum-pad kick"    data-drum="kick">🥁<span class="label">底鼓</span></button>
                <button class="drum-pad snare"   data-drum="snare">🥁<span class="label">军鼓</span></button>
                <button class="drum-pad cymbal"  data-drum="cymbal">🔔<span class="label">镲片</span></button>
                <button class="drum-pad clap"    data-drum="clap">👏<span class="label">拍手</span></button>
            </div>
        </div>

        <!-- Piano -->
        <div class="piano-section">
            <div class="section-label">🎹 钢琴</div>
            <div class="piano-container">
                <div class="white-keys">
                    <button class="white-key" data-note="C4">C4</button>
                    <button class="white-key" data-note="D4">D4</button>
                    <button class="white-key" data-note="E4">E4</button>
                    <button class="white-key" data-note="F4">F4</button>
                    <button class="white-key" data-note="G4">G4</button>
                    <button class="white-key" data-note="A4">A4</button>
                    <button class="white-key" data-note="B4">B4</button>
                    <button class="white-key" data-note="C5">C5</button>
                </div>
                <div class="black-keys">
                    <button class="black-key" data-note="C#4" style="left:calc(12.5% - 22px);">C#<span class="note-label">4</span></button>
                    <button class="black-key" data-note="D#4" style="left:calc(25% - 22px);">D#<span class="note-label">4</span></button>
                    <button class="black-key" data-note="F#4" style="left:calc(50% - 22px);">F#<span class="note-label">4</span></button>
                    <button class="black-key" data-note="G#4" style="left:calc(62.5% - 22px);">G#<span class="note-label">4</span></button>
                    <button class="black-key" data-note="A#4" style="left:calc(75% - 22px);">A#<span class="note-label">4</span></button>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="status-text" id="statusText">准备好了 🎶</div>
        <div class="controls">
            <button class="ctrl-btn record" id="recordBtn">⏺ 录制</button>
            <button class="ctrl-btn play" id="playBtn" disabled>▶ 播放</button>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ===== Audio Context =====
            let audioCtx = null;

            function getAudioCtx() {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                return audioCtx;
            }

            // ===== Note Frequencies (C4 - C5) =====
            const NOTES = {
                'C4': 261.63, 'C#4': 277.18,
                'D4': 293.66, 'D#4': 311.13,
                'E4': 329.63,
                'F4': 349.23, 'F#4': 369.99,
                'G4': 392.00, 'G#4': 415.30,
                'A4': 440.00, 'A#4': 466.16,
                'B4': 493.88,
                'C5': 523.25
            };

            // ===== Active Sounds (for note-off) =====
            const activeOscillators = {};

            // ===== Play Note On =====
            function noteOn(note, time) {
                const ctx = getAudioCtx();
                const freq = NOTES[note];
                if (!freq) return;

                const startTime = time || ctx.currentTime;

                // Stop any existing note
                if (activeOscillators[note]) {
                    try { activeOscillators[note].osc.stop(); } catch(e) {}
                    delete activeOscillators[note];
                }

                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0.5, startTime);
                gain.gain.exponentialRampToValueAtTime(0.001, startTime + 1.5);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(startTime);
                activeOscillators[note] = { osc, gain };
            }

            function noteOff(note) {
                if (activeOscillators[note]) {
                    try {
                        const ctx = getAudioCtx();
                        const { gain, osc } = activeOscillators[note];
                        const now = ctx.currentTime;
                        gain.gain.cancelScheduledValues(now);
                        gain.gain.setValueAtTime(gain.gain.value, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
                        osc.stop(now + 0.05);
                    } catch(e) {}
                    delete activeOscillators[note];
                }
            }

            function scheduledNoteOff(note, time) {
                if (activeOscillators[note]) {
                    try {
                        const { gain, osc } = activeOscillators[note];
                        gain.gain.cancelScheduledValues(time);
                        gain.gain.setValueAtTime(gain.gain.value, time);
                        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05);
                        osc.stop(time + 0.05);
                    } catch(e) {}
                    delete activeOscillators[note];
                }
            }

            // ===== Drum Sounds =====
            function playDrum(type, time) {
                const ctx = getAudioCtx();
                const now = time || ctx.currentTime;

                switch (type) {
                    case 'kick': {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(150, now);
                        osc.frequency.exponentialRampToValueAtTime(30, now + 0.12);
                        gain.gain.setValueAtTime(0.8, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.25);
                        break;
                    }
                    case 'snare': {
                        const bufferSize = ctx.sampleRate * 0.15;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        const noiseGain = ctx.createGain();
                        noiseGain.gain.setValueAtTime(0.5, now);
                        noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
                        noise.connect(noiseGain);
                        noiseGain.connect(ctx.destination);
                        noise.start(now);
                        noise.stop(now + 0.15);

                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(200, now);
                        gain.gain.setValueAtTime(0.4, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now);
                        osc.stop(now + 0.08);
                        break;
                    }
                    case 'cymbal': {
                        const bufferSize = ctx.sampleRate * 0.3;
                        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                        const data = buffer.getChannelData(0);
                        for (let i = 0; i < bufferSize; i++) {
                            data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                        }
                        const noise = ctx.createBufferSource();
                        noise.buffer = buffer;
                        const gain = ctx.createGain();
                        const filter = ctx.createBiquadFilter();
                        filter.type = 'highpass';
                        filter.frequency.value = 4000;
                        gain.gain.setValueAtTime(0.3, now);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                        noise.connect(filter);
                        filter.connect(gain);
                        gain.connect(ctx.destination);
                        noise.start(now);
                        noise.stop(now + 0.3);
                        break;
                    }
                    case 'clap': {
                        for (let j = 0; j < 3; j++) {
                            const delay = now + j * 0.025;
                            const bufferSize = ctx.sampleRate * 0.08;
                            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                            const data = buffer.getChannelData(0);
                            for (let i = 0; i < bufferSize; i++) {
                                data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
                            }
                            const noise = ctx.createBufferSource();
                            noise.buffer = buffer;
                            const gain = ctx.createGain();
                            const filter = ctx.createBiquadFilter();
                            filter.type = 'bandpass';
                            filter.frequency.value = 2000;
                            filter.Q.value = 0.5;
                            gain.gain.setValueAtTime(0.4, delay);
                            gain.gain.exponentialRampToValueAtTime(0.001, delay + 0.08);
                            noise.connect(filter);
                            filter.connect(gain);
                            gain.connect(ctx.destination);
                            noise.start(delay);
                            noise.stop(delay + 0.08);
                        }
                        break;
                    }
                }
            }

            // ===== Recording =====
            let isRecording = false;
            let recordedEvents = [];
            let recordingStartTime = 0;
            let isPlaying = false;
            let playbackTimeouts = [];

            const statusText = document.getElementById('statusText');
            const recordBtn = document.getElementById('recordBtn');
            const playBtn = document.getElementById('playBtn');

            function setStatus(msg) {
                statusText.textContent = msg;
            }

            function clearPlaybackTimeouts() {
                playbackTimeouts.forEach(id => clearTimeout(id));
                playbackTimeouts = [];
            }

            // ===== Piano UI =====
            function setupPianoKey(el) {
                const note = el.dataset.note;

                function startNote(e) {
                    e.preventDefault();
                    if (el.classList.contains('active')) return;
                    el.classList.add('active');
                    noteOn(note);

                    if (isRecording) {
                        recordedEvents.push({
                            type: 'noteOn',
                            note: note,
                            time: Date.now() - recordingStartTime
                        });
                    }
                }

                function endNote(e) {
                    e.preventDefault();
                    if (!el.classList.contains('active')) return;
                    el.classList.remove('active');
                    noteOff(note);

                    if (isRecording) {
                        recordedEvents.push({
                            type: 'noteOff',
                            note: note,
                            time: Date.now() - recordingStartTime
                        });
                    }
                }

                // Mouse
                el.addEventListener('mousedown', startNote);
                el.addEventListener('mouseup', endNote);
                el.addEventListener('mouseleave', endNote);

                // Touch
                el.addEventListener('touchstart', startNote, { passive: false });
                el.addEventListener('touchend', endNote, { passive: false });
                el.addEventListener('touchcancel', endNote, { passive: false });
            }

            document.querySelectorAll('.white-key, .black-key').forEach(setupPianoKey);

            // ===== Drum UI =====
            document.querySelectorAll('.drum-pad').forEach(el => {
                const type = el.dataset.drum;

                function hitDrum(e) {
                    e.preventDefault();
                    if (el.classList.contains('active')) return;
                    el.classList.add('active');
                    playDrum(type);

                    if (isRecording) {
                        recordedEvents.push({
                            type: 'drum',
                            drum: type,
                            time: Date.now() - recordingStartTime
                        });
                    }

                    setTimeout(() => {
                        el.classList.remove('active');
                    }, 150);
                }

                el.addEventListener('mousedown', hitDrum);
                el.addEventListener('touchstart', hitDrum, { passive: false });
            });

            // ===== Record Button =====
            recordBtn.addEventListener('click', function() {
                if (isRecording) {
                    isRecording = false;
                    recordBtn.classList.remove('recording');
                    recordBtn.innerHTML = '⏺ 录制';
                    setStatus(`已录制 ${recordedEvents.length} 个事件 🎶`);
                    playBtn.disabled = false;
                } else {
                    isRecording = true;
                    recordedEvents = [];
                    recordingStartTime = Date.now();
                    recordBtn.classList.add('recording');
                    recordBtn.innerHTML = '⏹ 停止';
                    playBtn.disabled = true;
                    setStatus('🔴 录制中...');
                }
            });

            // ===== Play Button =====
            playBtn.addEventListener('click', function() {
                if (isPlaying) return;
                if (recordedEvents.length === 0) {
                    setStatus('没有可播放的录制内容 🤷');
                    return;
                }

                isPlaying = true;
                playBtn.classList.add('playing');
                playBtn.innerHTML = '⏸ 播放中';
                recordBtn.disabled = true;
                setStatus('▶ 播放中...');

                const events = recordedEvents;
                let maxEndTime = 0;

                events.forEach(evt => {
                    const ctx = getAudioCtx();
                    const scheduledTime = ctx.currentTime + evt.time / 1000;

                    if (evt.type === 'noteOn') {
                        noteOn(evt.note, scheduledTime);
                    } else if (evt.type === 'noteOff') {
                        scheduledNoteOff(evt.note, scheduledTime);
                    } else if (evt.type === 'drum') {
                        playDrum(evt.drum, scheduledTime);
                    }

                    if (evt.time > maxEndTime) maxEndTime = evt.time;
                });

                const totalDuration = maxEndTime + 500;
                const endTimeout = setTimeout(() => {
                    isPlaying = false;
                    playBtn.classList.remove('playing');
                    playBtn.innerHTML = '▶ 播放';
                    recordBtn.disabled = false;
                    setStatus(`播放完成 ✅ (${events.length} 个事件)`);
                }, totalDuration);
                playbackTimeouts.push(endTimeout);
            });

            // ===== Global: prevent context menu =====
            document.addEventListener('contextmenu', e => e.preventDefault());

            setStatus('准备好了 🎶');
        })();
    </script>
</body>
</html>
