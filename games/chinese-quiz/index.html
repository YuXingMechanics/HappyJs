<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文小测验 - 快乐学习乐园</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        #gameContainer {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        #gameTitle {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #e17055;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        #topBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 15px;
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            border-radius: 16px;
            color: white;
        }
        #topBarLeft { display: flex; gap: 10px; }
        #topBarLeft button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        #topBarLeft button:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
        #stats {
            display: flex;
            gap: 20px;
            font-size: 16px;
            font-weight: 600;
        }
        /* ===== 模式标签 ===== */
        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .mode-tab {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: #f5f7fa;
            color: #666;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .mode-tab:hover { border-color: #e17055; color: #e17055; }
        .mode-tab.active {
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(225,112,85,0.3);
        }
        /* ===== 模式面板 ===== */
        .mode-panel { display: none; padding: 10px 0; }
        .mode-panel.active { display: block; }
        .mode-panel h2 {
            color: #e17055;
            font-size: 22px;
            margin-bottom: 6px;
        }
        .panel-desc {
            color: #888;
            font-size: 14px;
            margin-bottom: 18px;
        }
        /* ===== 设置行 ===== */
        .setting-row {
            margin-bottom: 16px;
            text-align: left;
        }
        .setting-row label {
            display: block;
            font-size: 14px;
            font-weight: 700;
            color: #555;
            margin-bottom: 8px;
        }
        .preset-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .preset-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            color: #666;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover { border-color: #e17055; color: #e17055; }
        .preset-btn.active {
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            color: white;
            border-color: transparent;
        }
        .challenge-input {
            margin-top: 8px;
            width: 100%;
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .challenge-input:focus { border-color: #e17055; }
        .start-challenge-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            color: white;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .start-challenge-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(225,112,85,0.4); }
        .timer-desc {
            text-align: center;
            font-size: 16px;
            color: #e17055;
            font-weight: 600;
            padding: 12px;
            background: #fff8f0;
            border-radius: 10px;
            margin-bottom: 16px;
        }
        /* ===== 计分/计时 ===== */
        #timer.countdown { color: #ff6b6b; }
        #timer.countdown.critical { animation: pulse 0.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        /* ===== 分类选择（保留原有） ===== */
        #startOverlay { text-align: center; padding: 10px 0; }
        .cat-select {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .cat-btn {
            padding: 16px 20px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .cat-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .cat-btn:active { transform: translateY(0); }
        .cat-1 { background: linear-gradient(135deg, #fdcb6e, #e17055); }
        .cat-2 { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
        .cat-3 { background: linear-gradient(135deg, #fd79a8, #e84393); }
        .cat-4 { background: linear-gradient(135deg, #00b894, #00cec9); }
        .cat-5 { background: linear-gradient(135deg, #0abde3, #48dbfb); }
        .cat-6 { background: linear-gradient(135deg, #ff9ff3, #f368e0); }

        #quizArea { display: none; }
        #catInfo {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            padding: 8px;
            background: #f5f7fa;
            border-radius: 10px;
        }
        #questionArea {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 20px;
            margin-bottom: 25px;
            min-height: 120px;
        }
        #questionNumber { font-size: 14px; color: #666; margin-bottom: 10px; }
        #questionLabel {
            font-size: 13px;
            color: #999;
            margin-bottom: 6px;
        }
        #questionText {
            font-size: 30px;
            font-weight: 800;
            color: #2d3436;
            margin-bottom: 8px;
            word-break: break-word;
            line-height: 1.5;
        }
        #questionHint {
            font-size: 14px;
            color: #636e72;
            margin-top: 6px;
        }
        #answerArea {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .answer-btn {
            padding: 18px 10px;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            color: white;
            word-break: break-word;
        }
        .answer-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(225,112,85,0.3); }
        .answer-btn:active { transform: translateY(0); }
        .answer-btn.correct { background: linear-gradient(135deg, #1dd1a1, #10ac84); }
        .answer-btn.wrong { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
        #feedback {
            text-align: center;
            margin-top: 20px;
            font-size: 20px;
            font-weight: 700;
            min-height: 30px;
        }
        #feedback.correct { color: #1dd1a1; }
        #feedback.wrong { color: #ff6b6b; }

        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        #overlay.show { opacity: 1; pointer-events: auto; }
        #overlayContent {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        #overlayContent h2 { color: #e17055; font-size: 32px; margin-bottom: 20px; }
        #finalStats { font-size: 18px; color: #666; margin-bottom: 30px; line-height: 1.8; }
        #overlayContent button {
            padding: 15px 40px;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #fdcb6e, #e17055);
            color: white;
            transition: all 0.3s;
        }
        #overlayContent button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(225,112,85,0.4); }

        .confetti {
            position: fixed;
            width: 10px; height: 10px;
            animation: fall linear infinite;
            z-index: 9999;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            #gameContainer { padding: 20px; }
            #questionText { font-size: 24px; }
            .answer-btn { padding: 14px 8px; font-size: 17px; }
            .cat-btn { padding: 13px 16px; font-size: 15px; }
            .mode-tab { font-size: 13px; padding: 10px 6px; }
            .preset-btn { font-size: 12px; padding: 6px 12px; }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameTitle">📚 语文小测验</div>

        <div id="topBar">
            <div id="topBarLeft">
                <button onclick="location.href='../../'">🏠</button>
                <button onclick="restartGame()">🔄 重新开始</button>
            </div>
            <div id="stats">
                <span>📝 <span id="currentQ">1</span> / <span id="totalQ">10</span></span>
                <span>✅ <span id="score">0</span></span>
                <span>⏱️ <span id="timer">0</span>s</span>
            </div>
        </div>

        <div id="startOverlay">
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="study" onclick="switchMode('study')">📖 学习模式</button>
                <button class="mode-tab" data-mode="challenge" onclick="switchMode('challenge')">🏆 挑战赛</button>
                <button class="mode-tab" data-mode="timer" onclick="switchMode('timer')">⏱️ 计时赛</button>
            </div>

            <!-- 学习模式 -->
            <div class="mode-panel active" id="panel-study">
                <h2>📖 学习模式</h2>
                <p class="panel-desc">选择分类和难度，开始学习！</p>
                <div class="cat-select">
                    <button class="cat-btn cat-1" onclick="startStudy('character')">🖌️ 认字识字</button>
                    <button class="cat-btn cat-2" onclick="startStudy('idiom')">📖 成语填空</button>
                    <button class="cat-btn cat-3" onclick="startStudy('poem')">🌸 古诗接龙</button>
                    <button class="cat-btn cat-4" onclick="startStudy('reading')">📜 读一读</button>
                    <button class="cat-btn cat-5" onclick="startStudy('ordering')">🧩 连句成段</button>
                    <button class="cat-btn cat-6" onclick="startStudy('reading2')">📖 阅读理解</button>
                </div>
                <div class="setting-row">
                    <label>难度选择：</label>
                    <div class="preset-btns diff-btns">
                        <button class="preset-btn" data-diff="1" onclick="selectStudyDiff(1)">🍭 简单</button>
                        <button class="preset-btn active" data-diff="2" onclick="selectStudyDiff(2)">🍫 普通</button>
                        <button class="preset-btn" data-diff="3" onclick="selectStudyDiff(3)">🔥 困难</button>
                    </div>
                </div>
            </div>

            <!-- 挑战赛 -->
            <div class="mode-panel" id="panel-challenge">
                <h2>🏆 挑战赛</h2>
                <p class="panel-desc">限时答题，挑战自我！</p>
                <div class="setting-row">
                    <label>分类选择：</label>
                    <div class="preset-btns">
                        <button class="preset-btn active" data-challenge-cat="character" onclick="selectChallengeCat('character')">🖌️ 认字识字</button>
                        <button class="preset-btn" data-challenge-cat="idiom" onclick="selectChallengeCat('idiom')">📖 成语填空</button>
                        <button class="preset-btn" data-challenge-cat="poem" onclick="selectChallengeCat('poem')">🌸 古诗接龙</button>
                        <button class="preset-btn" data-challenge-cat="reading" onclick="selectChallengeCat('reading')">📜 读一读</button>
                        <button class="preset-btn" data-challenge-cat="ordering" onclick="selectChallengeCat('ordering')">🧩 连句成段</button>
                        <button class="preset-btn" data-challenge-cat="reading2" onclick="selectChallengeCat('reading2')">📖 阅读理解</button>
                    </div>
                </div>
                <div class="setting-row">
                    <label>难度选择：</label>
                    <div class="preset-btns">
                        <button class="preset-btn active" data-challenge-diff="1" onclick="selectChallengeDiff(1)">🍭 简单</button>
                        <button class="preset-btn" data-challenge-diff="2" onclick="selectChallengeDiff(2)">🍫 普通</button>
                        <button class="preset-btn" data-challenge-diff="3" onclick="selectChallengeDiff(3)">🔥 困难</button>
                    </div>
                </div>
                <div class="setting-row">
                    <label>题目数量：</label>
                    <div class="preset-btns">
                        <button class="preset-btn" data-count="5" onclick="selectChallengeCount(5)">5</button>
                        <button class="preset-btn active" data-count="10" onclick="selectChallengeCount(10)">10</button>
                        <button class="preset-btn" data-count="15" onclick="selectChallengeCount(15)">15</button>
                        <button class="preset-btn" data-count="20" onclick="selectChallengeCount(20)">20</button>
                    </div>
                    <input class="challenge-input" type="number" id="challengeCountInput" placeholder="自定义题数..." min="1" max="50">
                </div>
                <div class="setting-row">
                    <label>时间限制(秒)：</label>
                    <div class="preset-btns">
                        <button class="preset-btn" data-time="30" onclick="selectChallengeTime(30)">30</button>
                        <button class="preset-btn active" data-time="60" onclick="selectChallengeTime(60)">60</button>
                        <button class="preset-btn" data-time="90" onclick="selectChallengeTime(90)">90</button>
                        <button class="preset-btn" data-time="120" onclick="selectChallengeTime(120)">120</button>
                    </div>
                    <input class="challenge-input" type="number" id="challengeTimeInput" placeholder="自定义时间..." min="10" max="600">
                </div>
                <button class="start-challenge-btn" onclick="startChallenge()">🚀 开始挑战</button>
            </div>

            <!-- 计时赛 -->
            <div class="mode-panel" id="panel-timer">
                <h2>⏱️ 计时赛</h2>
                <p class="panel-desc">尽可能快地答题！</p>
                <div class="setting-row">
                    <label>分类选择：</label>
                    <div class="preset-btns">
                        <button class="preset-btn active" data-timer-cat="character" onclick="selectTimerCat('character')">🖌️ 认字识字</button>
                        <button class="preset-btn" data-timer-cat="idiom" onclick="selectTimerCat('idiom')">📖 成语填空</button>
                        <button class="preset-btn" data-timer-cat="poem" onclick="selectTimerCat('poem')">🌸 古诗接龙</button>
                        <button class="preset-btn" data-timer-cat="reading" onclick="selectTimerCat('reading')">📜 读一读</button>
                        <button class="preset-btn" data-timer-cat="ordering" onclick="selectTimerCat('ordering')">🧩 连句成段</button>
                        <button class="preset-btn" data-timer-cat="reading2" onclick="selectTimerCat('reading2')">📖 阅读理解</button>
                    </div>
                </div>
                <div class="setting-row">
                    <label>难度选择：</label>
                    <div class="preset-btns">
                        <button class="preset-btn active" data-timer-diff="1" onclick="selectTimerDiff(1)">🍭 简单</button>
                        <button class="preset-btn" data-timer-diff="2" onclick="selectTimerDiff(2)">🍫 普通</button>
                        <button class="preset-btn" data-timer-diff="3" onclick="selectTimerDiff(3)">🔥 困难</button>
                    </div>
                </div>
                <p class="timer-desc">⏱️ 尽可能快地答题！完成全部题目，用时越短越好！</p>
                <button class="start-challenge-btn" onclick="startTimerRace()">⏱️ 开始计时赛</button>
            </div>
        </div>

        <div id="quizArea">
            <div id="catInfo"></div>
            <div id="questionArea">
                <div id="questionNumber">第 1 题</div>
                <div id="questionLabel"></div>
                <div id="questionText"></div>
                <div id="questionHint"></div>
            </div>
            <div id="answerArea">
                <button class="answer-btn" onclick="checkAnswer(0)">A</button>
                <button class="answer-btn" onclick="checkAnswer(1)">B</button>
                <button class="answer-btn" onclick="checkAnswer(2)">C</button>
                <button class="answer-btn" onclick="checkAnswer(3)">D</button>
            </div>
            <div id="feedback"></div>
        </div>
    </div>

    <div id="overlay">
        <div id="overlayContent">
            <div id="resultEmoji"></div>
            <h2 id="resultTitle">🎉 挑战完成！</h2>
            <div id="finalStats"></div>
            <button onclick="restartGame()">🔄 再来一次</button>
        </div>
    </div>

    <script>
        // ============================================================
        //  数据
        // ============================================================
        const questionBank = {
            // -------- 认字识字 (45题) --------
            character: [
                { q: '下面哪个字读 "shān"？', hint: '⛰️ 很高的地方', opts: ['三', '山', '上', '石'], ans: 1, diff: 1 },
                { q: '下面哪个字读 "yuè"？', hint: '🌙 晚上的天空', opts: ['月', '日', '目', '白'], ans: 0, diff: 1 },
                { q: '下面哪个字读 "huǒ"？', hint: '🔥 热热的、红红的', opts: ['水', '木', '火', '土'], ans: 2, diff: 1 },
                { q: '下面哪个字读 "shuǐ"？', hint: '💧 透明的液体', opts: ['木', '火', '水', '土'], ans: 2, diff: 1 },
                { q: '"大" 字是什么意思？', hint: '和大相反的是什么？', opts: ['中', '小', '多', '长'], ans: 1, diff: 1 },
                { q: '下面哪个字是 "yún"？', hint: '☁️ 天上下雨前有它', opts: ['去', '云', '雨', '风'], ans: 1, diff: 1 },
                { q: '下面哪个字是 "tiān"？', hint: '头顶上面的叫？', opts: ['大', '天', '人', '夫'], ans: 1, diff: 1 },
                { q: '"上" 字的反义词是什么？', hint: '上和什么相反？', opts: ['中', '下', '左', '右'], ans: 1, diff: 1 },
                { q: '下面哪个字读 "mù"？', hint: '🌳 看到的东西', opts: ['日', '月', '木', '本'], ans: 2, diff: 1 },
                { q: '下面哪个字读 "kǒu"？', hint: '😮 吃东西的地方', opts: ['日', '口', '田', '石'], ans: 1, diff: 1 },
                { q: '"牛" 字读什么？', hint: '🐄 农民伯伯养的动物', opts: ['niú', 'mǎ', 'yáng', 'zhū'], ans: 0, diff: 2 },
                { q: '"花" 字读什么？', hint: '🌸 植物的花朵', opts: ['cǎo', 'huā', 'shù', 'yè'], ans: 1, diff: 2 },
                { q: '下面哪个字读 "yǔ"？', hint: '🌧️ 天上掉下来的水', opts: ['雨', '雷', '电', '雪'], ans: 0, diff: 2 },
                { q: '"手" 字是什么意思？', hint: '✋ 用来拿东西的部位', opts: ['脚', '手', '头', '脸'], ans: 1, diff: 2 },
                { q: '下面哪个字读 "rì"？', hint: '☀️ 白天天上的', opts: ['目', '白', '日', '田'], ans: 2, diff: 2 },
                { q: '"风" 字读什么？', hint: '🌬️ 看不见摸不着', opts: ['fēng', 'yǔ', 'yún', 'léi'], ans: 0, diff: 2 },
                { q: '下面哪个字是 "马"？', hint: '🐴 可以骑的动物', opts: ['牛', '羊', '马', '狗'], ans: 2, diff: 2 },
                { q: '"门" 字读什么？', hint: '🚪 进出房间的地方', opts: ['chuāng', 'mén', 'guān', 'kāi'], ans: 1, diff: 2 },
                { q: '下面哪个字读 "chóng"？', hint: '🐛 小小的生物', opts: ['龙', '虫', '鸟', '鱼'], ans: 1, diff: 2 },
                { q: '"金" 字是什么意思？', hint: '💰 黄黄的值钱的东西', opts: ['木头', '水', '金子', '土'], ans: 2, diff: 2 },
                { q: '"明" 字由哪两个字组成？', hint: '明=？+？', opts: ['日+月', '日+天', '月+亮', '太+阳'], ans: 0, diff: 3 },

                { q: '小红把文具盒忘在家里了。上课时，同桌的小刚把铅笔借给她用。小红很感谢小刚。\n\n小红为什么感谢小刚？', hint: '读一读，想一想', opts: ['小刚帮她写作业', '小刚借她铅笔', '小刚陪她玩', '小刚送她回家'], ans: 1, diff: 1 },
                { q: '秋天到了，树叶变黄了，一片片落下来。果园里的苹果红了，梨子黄了，农民伯伯开心地摘水果。\n\n秋天果园里有什么？', hint: '读一读，想一想', opts: ['雪花', '苹果和梨子', '小草', '鲜花'], ans: 1, diff: 1 },
                { q: '小兔和小乌龟赛跑。小兔跑得很快，但是它在半路上睡觉了。小乌龟慢慢地爬，一直不停止，最后先到达了终点。\n\n谁赢了比赛？', hint: '读一读，想一想', opts: ['小兔', '小乌龟', '一起到的', '没有赢家'], ans: 1, diff: 1 },
                { q: '妈妈带我去动物园。我看到了大象、猴子、长颈鹿。大象的鼻子很长，猴子在树上跳来跳去，长颈鹿的脖子很长。\n\n文中没有提到什么动物？', hint: '读一读，想一想', opts: ['大象', '猴子', '老虎', '长颈鹿'], ans: 2, diff: 1 },
                { q: '今天是妈妈的生日。我画了一幅画送给妈妈，画上有花和蝴蝶。妈妈看了很开心，抱了抱我。\n\n我送了什么礼物给妈妈？', hint: '读一读，想一想', opts: ['一束花', '一幅画', '一个蛋糕', '一张贺卡'], ans: 1, diff: 2 },
                { q: '小鸭子不会游泳，它很羡慕其他小鸭子在水里游来游去。鸭妈妈鼓励它说：\'慢慢来，你一定能学会！\'小鸭子每天都练习，终于学会了游泳。\n\n小鸭子最后怎么样了？', hint: '读一读，想一想', opts: ['放弃了游泳', '学会了游泳', '还在羡慕别人', '不喜欢游泳了'], ans: 1, diff: 2 },
                { q: '图书馆里非常安静。大家都在认真看书。小明轻轻地走进去，选了一本故事书，坐下来静静地看。\n\n在图书馆里应该怎么做？', hint: '读一读，想一想', opts: ['大声说话', '跑来跑去', '安静看书', '吃东西'], ans: 2, diff: 2 },
                { q: '下雨了，小花没有带伞。小云看见了，主动和小花一起打伞回家。小花说：\'谢谢你！\'小云说：\'不客气！\' \n\n小云是一个什么样的人？', hint: '读一读，想一想', opts: ['小气', '自私', '乐于助人', '调皮'], ans: 2, diff: 2 },
                { q: '公鸡每天早上都打鸣叫大家起床。有一天公鸡生病了，没有打鸣。结果大家都起晚了。\n\n大家为什么起晚了？', hint: '读一读，想一想', opts: ['睡得太晚了', '公鸡没有打鸣', '天没亮', '闹钟坏了'], ans: 1, diff: 2 },
                { q: '小松鼠在树上跳来跳去找松果。它找到了很多松果，开心地把它们藏在了树洞里，准备冬天吃。\n\n小松鼠为什么藏松果？', hint: '读一读，想一想', opts: ['不喜欢吃', '给朋友吃', '冬天吃', '卖钱'], ans: 2, diff: 2 },
                { q: '学校要开运动会了。小明报了跑步，小丽报了跳远，小华报了跳绳。大家每天都认真练习，都想为班级争光。\n\n大家为什么认真练习？', hint: '读一读，想一想', opts: ['为了好玩', '想为班级争光', '老师要求的', '没事做'], ans: 1, diff: 2 },
                { q: '夏天的晚上，爷爷在院子里给我讲故事。天上的星星一闪一闪的，萤火虫飞来飞去。我觉得夏天的夜晚真美啊！\n\n故事发生的时间是什么时候？', hint: '读一读，想一想', opts: ['中午', '早上', '夏天的晚上', '冬天的晚上'], ans: 2, diff: 2 },
                { q: '小猴子下山，走过玉米地，摘了玉米；走过桃树下，丢了玉米摘桃子；走过西瓜地，丢了桃子摘西瓜；看见小兔，丢了西瓜追小兔。最后什么也没得到。\n\n小猴子最后得到了什么？', hint: '读一读，想一想', opts: ['玉米', '桃子', '西瓜', '什么也没得到'], ans: 3, diff: 3 },
                { q: '马路上，一位老奶奶过马路走得很慢。小红看见了，马上跑过去扶着老奶奶过了马路。老奶奶笑着说：\'谢谢你，好孩子！\' \n\n小红做了什么好事？', hint: '读一读，想一想', opts: ['帮老奶奶拿东西', '扶着老奶奶过马路', '给老奶奶让座', '陪老奶奶聊天'], ans: 1, diff: 3 },
                { q: '青蛙住在井里，它觉得天只有井口那么大。小鸟飞来告诉它：\'天无边无际大得很！\'青蛙不相信，跳出来一看，果然天很大很大。\n\n青蛙一开始为什么觉得天很小？', hint: '读一读，想一想', opts: ['天本来就小', '它住在井里只能看到井口大的天', '小鸟告诉它的', '它眼睛有问题'], ans: 1, diff: 3 },
                { q: '春天，小明和爸爸在院子里种了一棵小树苗。小明每天给小树浇水。到了秋天，小树长高了，小明也很开心。\n\n小明每天给小树做什么？', hint: '读一读，想一想', opts: ['施肥', '浇水', '唱歌', '说话'], ans: 1, diff: 3 },
                { q: '小猫咪咪喜欢照镜子。一天它对着镜子做鬼脸，镜子里也出现一个做鬼脸的小猫。咪咪觉得很奇怪。\n\n镜子里的小猫是谁？', hint: '读一读，想一想', opts: ['另一只小猫', '咪咪自己', '小狗狗', '小老鼠'], ans: 1, diff: 3 },
                { q: '爸爸带我去海边玩。海很大很大，一眼望不到边。海鸥在天上飞，我在沙滩上捡贝壳，开心极了。\n\n我在沙滩上做什么？', hint: '读一读，想一想', opts: ['游泳', '捡贝壳', '堆沙子', '看海鸥'], ans: 1, diff: 3 },
                { q: '生日那天，我收到了很多礼物。有玩具汽车、故事书、彩色笔。我最喜欢的是那本故事书，因为我很喜欢看书。\n\n我最喜欢什么礼物？', hint: '读一读，想一想', opts: ['玩具汽车', '彩色笔', '故事书', '蛋糕'], ans: 2, diff: 3 },
                { q: '乌鸦口渴了，它找到一个瓶子，瓶子里有半瓶水。可是瓶口太小，嘴伸不进去。乌鸦把石子一颗颗放进瓶子里，水位升高了，乌鸦终于喝到了水。\n\n乌鸦用了什么办法喝到水？', hint: '读一读，想一想', opts: ['打破瓶子', '把石子放进瓶子里', '找其他水', '把瓶子倒过来'], ans: 1, diff: 3 },
                { q: '课堂上有同学在发言，我们应该怎么做？', hint: '想一想，在课堂上', opts: ['大声说话', '认真倾听', '跑来跑去', '玩玩具'], ans: 1, diff: 3 },
                { q: '小明的书包是蓝色的，里面装着课本和文具盒。\n\n小明的书包是什么颜色？', hint: '读一读，想一想', opts: ['红色', '蓝色', '绿色', '黄色'], ans: 1, diff: 1 },
                { q: '小华每天放学后先写作业，然后才去玩。\n\n小华放学后先做什么？', hint: '读一读，想一想', opts: ['去玩', '看电视', '写作业', '吃饭'], ans: 2, diff: 1 },
                { q: '妈妈买了很多水果，有苹果、香蕉和橘子。\n\n妈妈没有买什么水果？', hint: '读一读，想一想', opts: ['苹果', '香蕉', '橘子', '西瓜'], ans: 3, diff: 1 },
                { q: '太阳从东方升起，从西方落下。\n\n太阳从哪边升起？', hint: '读一读，想一想', opts: ['西方', '南方', '北方', '东方'], ans: 3, diff: 1 },
                { q: '小猫喜欢吃鱼，小狗喜欢吃肉。\n\n小狗喜欢吃什么？', hint: '读一读，想一想', opts: ['鱼', '肉', '菜', '水果'], ans: 1, diff: 1 },
                { q: '森林里住着小兔和小鹿。小兔的耳朵长，小鹿的脖子长。它们是最好的朋友。\n\n谁和谁是好朋友？', hint: '读一读，想一想', opts: ['小兔和小猫', '小鹿和小狗', '小兔和小鹿', '小鹿和小马'], ans: 2, diff: 2 },
                { q: '春天来了，燕子从南方飞回来了。小草从地下钻出来了。花儿也开了。到处是一片生机勃勃的景象。\n\n燕子从哪飞回来了？', hint: '读一读，想一想', opts: ['北方', '南方', '东方', '西方'], ans: 1, diff: 2 },
                { q: '小红想给妈妈做生日礼物。她找来彩纸和胶水，做了一张漂亮的贺卡。妈妈收到后非常开心。\n\n小红做了什么礼物？', hint: '读一读，想一想', opts: ['蛋糕', '贺卡', '花', '画'], ans: 1, diff: 2 },
                { q: '大熊猫是中国的国宝。它喜欢吃竹子。它胖胖的身体是黑白两色的，非常可爱。\n\n大熊猫喜欢吃什么？', hint: '读一读，想一想', opts: ['苹果', '竹子', '肉', '蜂蜜'], ans: 1, diff: 2 },
                { q: '小明今天值日。他早早来到学校，把黑板擦干净，把桌椅摆整齐，然后给花浇了水。\n\n小明没有做什么？', hint: '读一读，想一想', opts: ['擦黑板', '摆桌椅', '浇花', '扫地'], ans: 3, diff: 2 },
                { q: '从前有个人叫叶公。他特别喜欢龙，家里到处都画着龙。天上的真龙知道了，就来到他家。叶公看到真龙，吓得大叫着跑了。\n\n叶公看到真龙后怎么样了？', hint: '读一读，想一想', opts: ['很高兴', '吓得跑了', '和龙玩', '请龙喝茶'], ans: 1, diff: 3 },
                { q: '爱因斯坦小时候不太会说话。他的父母很担心。但是后来他成为了世界上最伟大的科学家之一。这个故事告诉我们不能只看一个人的开始。\n\n这个故事告诉我们要怎么做？', hint: '读一读，想一想', opts: ['要多说话', '不要小看别人', '要当科学家', '要担心孩子'], ans: 1, diff: 3 },
                { q: '一天，小猴和小熊在森林里散步。小猴看到树上有一个蜂巢，想吃蜂蜜。它让小熊帮忙摇树。小熊用力一摇，蜂巢掉下来，蜜蜂都飞出来了。小猴和小熊被蜜蜂蛰得满山跑。\n\n它们为什么被蜜蜂蛰了？', hint: '读一读，想一想', opts: ['因为它们打碎了蜂巢', '因为它们在树下玩', '因为它们走路太大声', '因为它们在摘花'], ans: 0, diff: 3 },
                { q: '水有几种形态。在常温下是液体。当温度降到0度以下时，会变成固体（冰）。当温度升到100度时，会变成气体（水蒸气）。\n\n水在什么温度下会变成冰？', hint: '读一读，想一想', opts: ['100度以上', '0度以下', '50度', '20度'], ans: 1, diff: 3 },
                { q: '骆驼被称为"沙漠之舟"。它们能长时间不喝水，因为它们的驼峰里储存着脂肪。它们的睫毛很长，可以挡住风沙。它们的脚掌很宽，在沙地上不会陷下去。\n\n骆驼的驼峰里储存着什么？', hint: '读一读，想一想', opts: ['水', '食物', '脂肪', '空气'], ans: 2, diff: 3 },

                { q: '春天，小明在院子里种了一棵小树。他每天给小树浇水。小树慢慢长出了嫩绿的叶子。到了夏天，小树长高了很多。秋天到了，小树的叶子变黄了，落了一地。冬天到了，小树光秃秃的，但小明知道，明年春天它又会发芽。\n\n小树的叶子什么时候变黄？', hint: '读一读', opts: ['春天', '夏天', '秋天', '冬天'], ans: 2, diff: 3 },
                { q: '在一个美丽的大森林里，住着许多小动物。有一只小松鼠特别喜欢收集松果。它每天从早到晚都在找松果。它的树洞里堆满了松果。冬天来了，其他小动物没有食物吃，小松鼠就把自己的松果分给大家。大家都非常感激小松鼠。\n\n小松鼠把松果分给了谁？', hint: '读一读', opts: ['只给自己', '给了其他小动物', '卖掉了', '扔掉了'], ans: 1, diff: 3 },
                { q: '星期天，爸爸带我去科技馆。科技馆里有机器人、太空船、恐龙化石。我看到了一个会说话的机器人，它还会走路呢！在太空馆，我了解到月球上没有空气，人无法在月球上呼吸。在恐龙馆，我看到了一具巨大的恐龙骨架，比三层楼还高。\n\n关于月球，文中说了什么？', hint: '读一读', opts: ['月球上有空气', '月球上没有空气', '月球上有水', '月球上有树'], ans: 1, diff: 3 },

        const catNames = {
            character: '🖌️ 认字识字',
            idiom: '📖 成语填空',

        const diffLabels = { 1: '🍭 简单', 2: '🍫 普通', 3: '🔥 困难' };

        // ============================================================
        //  DOM 引用
        // ============================================================
        const startOverlay = document.getElementById('startOverlay');
        const quizArea = document.getElementById('quizArea');
        const catInfo = document.getElementById('catInfo');
        const questionText = document.getElementById('questionText');
        const questionLabel = document.getElementById('questionLabel');
        const questionNumber = document.getElementById('questionNumber');
        const questionHint = document.getElementById('questionHint');
        const answerButtons = document.querySelectorAll('.answer-btn');

        const overlay = document.getElementById('overlay');

        const resultTitle = document.getElementById('resultTitle');
        const finalStats = document.getElementById('finalStats');

        let currentQuestion = 0;
        let score = 0;
        let timer = 0;
        let timerInterval = null;
        let category = 'character';
        let currentQuestions = [];
        let currentAnswer = 0;
        let isPlaying = false;

        // ===== 模式状态 =====
        let gameMode = 'study';
        let studyDiff = 2;

        let challengeDiff = 1;
        let challengeCount = 10;
        let challengeTime = 60;

        let countdownInterval = null;
        let challengeAnswered = 0;
        let isGameOver = false;

        // ============================================================
        //  音效
        // ============================================================
        const QuizAudio = (() => {
            let ctx = null;
            function init() {
                if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
            }
            function playTone(freq, type, duration) {
                init();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            }
            return {
                init() { init(); },
                correct() {
                    playTone(600, 'sine', 0.1);
                    setTimeout(() => playTone(800, 'sine', 0.1), 100);
                    setTimeout(() => playTone(1000, 'sine', 0.2), 200);
                },
                wrong() {
                    playTone(300, 'sawtooth', 0.3);
                    setTimeout(() => playTone(250, 'sawtooth', 0.3), 150);
                },
                victory() {
                    const notes = [523, 659, 784, 1047];
                    notes.forEach((n, i) => setTimeout(() => playTone(n, 'sine', 0.3), i * 150));
                }
            };
        })();

        // ============================================================
        //  工具
        // ============================================================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function preGenerateQuestions(cat, diff, count) {
            const bank = questionBank[cat];
            const filtered = bank.filter(q => q.diff === diff);
            const shuffled = shuffleArray([...filtered]);
            return shuffled.slice(0, count);
        }

        // ============================================================
        //  模式切换
        // ============================================================
        function switchMode(mode) {
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
            document.querySelectorAll('.mode-panel').forEach(panel => {
                panel.classList.toggle('active', panel.id === 'panel-' + mode);
            });
        }

            document.querySelectorAll('#panel-timer .preset-btn[data-timer-diff]').forEach(btn => {

        // ============================================================
        //  游戏启动
        // ============================================================
        function startStudy(cat) {
            QuizAudio.init();
            gameMode = 'study';
            category = cat;
            currentQuestion = 0;
            score = 0;
            timer = 0;
            isPlaying = true;
            isGameOver = false;

            const totalCount = 10;
            currentQuestions = preGenerateQuestions(cat, studyDiff, totalCount);

            startOverlay.style.display = 'none';
            quizArea.style.display = 'block';
            catInfo.textContent = '📂 ' + catNames[cat] + ' | ' + diffLabels[studyDiff];
            catInfo.style.display = 'block';

            scoreEl.textContent = '0';
            timerEl.textContent = '0';
            timerEl.classList.remove('countdown', 'critical');
            totalQEl.textContent = currentQuestions.length;

            clearAllIntervals();
            timerInterval = setInterval(() => {
                timer++;
                timerEl.textContent = timer;
            }, 1000);

            displayQuestion();
        }

        function startChallenge() {
            // 检查自定义输入
            const countInput = document.getElementById('challengeCountInput');
            if (countInput.value) {
                const v = parseInt(countInput.value);
                if (v > 0 && v <= 50) challengeCount = v;
            }
            const timeInput = document.getElementById('challengeTimeInput');
            if (timeInput.value) {
                const v = parseInt(timeInput.value);
                if (v >= 10 && v <= 600) challengeTime = v;
            }

            if (challengeCount < 1) { challengeCount = 1; }
            if (challengeTime < 10) { challengeTime = 10; }

            QuizAudio.init();
            gameMode = 'challenge';
            category = challengeCat;
            currentQuestion = 0;
            score = 0;
            timer = 0;
            challengeAnswered = 0;
            countdownValue = challengeTime;
            isPlaying = true;
            isGameOver = false;

            currentQuestions = preGenerateQuestions(challengeCat, challengeDiff, challengeCount);

            if (currentQuestions.length === 0) {
                alert('该分类下没有匹配难度的题目，请调整设置。');
                return;
            }

            startOverlay.style.display = 'none';
            quizArea.style.display = 'block';
            catInfo.textContent = '🏆 ' + catNames[challengeCat] + ' | ' + diffLabels[challengeDiff] + ' | 限时 ' + challengeTime + 's';
            catInfo.style.display = 'block';

            scoreEl.textContent = '0';
            timerEl.textContent = challengeTime;
            timerEl.classList.add('countdown');
            timerEl.classList.remove('critical');
            totalQEl.textContent = currentQuestions.length;

            clearAllIntervals();
            countdownInterval = setInterval(() => {
                countdownValue--;
                timerEl.textContent = countdownValue;
                if (countdownValue <= 5) {
                    timerEl.classList.add('critical');
                }
                if (countdownValue <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    endChallenge();
                }
            }, 1000);

            displayQuestion();
        }

        function startTimerRace() {
            QuizAudio.init();
            gameMode = 'timer';
            category = timerCat;
            currentQuestion = 0;
            score = 0;
            timer = 0;
            isPlaying = true;
            isGameOver = false;

            currentQuestions = preGenerateQuestions(timerCat, timerDiff, 10);

            if (currentQuestions.length === 0) {
                alert('该分类下没有匹配难度的题目，请调整设置。');
                return;
            }

            startOverlay.style.display = 'none';
            quizArea.style.display = 'block';
            catInfo.textContent = '⏱️ ' + catNames[timerCat] + ' | ' + diffLabels[timerDiff];
            catInfo.style.display = 'block';

            scoreEl.textContent = '0';
            timerEl.textContent = '0';
            timerEl.classList.remove('countdown', 'critical');
            totalQEl.textContent = currentQuestions.length;

            clearAllIntervals();
            timerInterval = setInterval(() => {
                timer++;
                timerEl.textContent = timer;
            }, 1000);

            displayQuestion();
        }

        // ============================================================
        //  游戏逻辑
        // ============================================================
        function displayQuestion() {
            if (isGameOver) return;

            if (currentQuestion >= currentQuestions.length) {
                if (gameMode === 'challenge') {
                    endChallenge();
                } else {
                    onVictory();
                }
                return;
            }

            const q = currentQuestions[currentQuestion];
            questionNumber.textContent = `第 ${currentQuestion + 1} 题`;
            questionText.textContent = q.q;
            questionHint.textContent = q.hint || '';

            const catLabels = {
                character: '请选择正确的答案：',
                idiom: '请选择正确的字填入空白处：',
                poem: '请选择正确的诗句：',
                reading: '请根据短文选择正确的答案：',
                ordering: '请选择正确的排列顺序：',
                reading2: '请根据短文选择正确的答案：',
            };
            questionLabel.textContent = catLabels[category] || '';

            currentAnswer = q.ans;

            answerButtons.forEach((btn, i) => {
                btn.textContent = q.opts[i];
                btn.classList.remove('correct', 'wrong');
                btn.disabled = false;
                btn.style.display = '';
            });

            feedback.textContent = '';
            feedback.classList.remove('correct', 'wrong');
            currentQEl.textContent = currentQuestion + 1;
        }

        function checkAnswer(index) {
            if (!isPlaying || isGameOver) return;
            answerButtons.forEach(btn => btn.disabled = true);

            if (index === currentAnswer) {
                answerButtons[index].classList.add('correct');
                feedback.textContent = '✅ 回答正确！太棒了！';
                feedback.classList.add('correct');
                score++;
                scoreEl.textContent = score;
                QuizAudio.correct();
            } else {
                answerButtons[index].classList.add('wrong');
                feedback.textContent = `❌ 回答错误！正确答案是：${currentQuestions[currentQuestion].opts[currentAnswer]}`;
                feedback.classList.add('wrong');
                QuizAudio.wrong();
                answerButtons[currentAnswer].classList.add('correct');
            }

            currentQuestion++;
            if (gameMode === 'challenge') {
                challengeAnswered++;
            }

            setTimeout(() => {
                displayQuestion();
            }, 1200);
        }

        function endChallenge() {
            if (isGameOver) return;
            isGameOver = true;
            isPlaying = false;
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            // 计算实际用时
            const actualTime = challengeTime - countdownValue;

            QuizAudio.victory();

            const total = currentQuestions.length;
            const pct = total > 0 ? Math.round((score / total) * 100) : 0;

            resultEmoji.textContent = pct >= 80 ? '🏆' : pct >= 50 ? '👏' : '😅';
            resultTitle.textContent = '挑战赛结束！';
            finalStats.innerHTML =
                '分类：' + catNames[challengeCat] + '<br>' +
                '难度：' + diffLabels[challengeDiff] + '<br>' +
                '得分：<strong>' + score + '</strong> / ' + total + '<br>' +
                '用时：' + actualTime + ' 秒<br>' +
                '正确率：' + pct + '%';

            overlay.classList.add('show');
            launchConfetti();
        }

        function onVictory() {
            isPlaying = false;
            isGameOver = true;
            clearAllIntervals();
            QuizAudio.victory();

            const total = currentQuestions.length;
            const pct = total > 0 ? Math.round((score / total) * 100) : 0;

            if (gameMode === 'timer') {
                resultEmoji.textContent = pct >= 80 ? '⚡' : pct >= 50 ? '👍' : '💪';
                resultTitle.textContent = '计时赛完成！';
                finalStats.innerHTML =
                    '分类：' + catNames[timerCat] + '<br>' +
                    '难度：' + diffLabels[timerDiff] + '<br>' +
                    '得分：<strong>' + score + '</strong> / ' + total + '<br>' +
                    '总用时：' + timer + ' 秒<br>' +
                    '正确率：' + pct + '%';
            } else {
                // 学习模式
                resultEmoji.textContent = pct >= 80 ? '🎉' : pct >= 50 ? '👍' : '💪';
                resultTitle.textContent = '学习完成！';
                finalStats.innerHTML =
                    '分类：' + catNames[category] + '<br>' +
                    '难度：' + diffLabels[studyDiff] + '<br>' +
                    '得分：<strong>' + score + '</strong> / ' + total + '<br>' +
                    '用时：' + timer + ' 秒<br>' +
                    '正确率：' + pct + '%';
            }

            overlay.classList.add('show');
            launchConfetti();
        }

        function restartGame() {
            clearAllIntervals();
            overlay.classList.remove('show');
            startOverlay.style.display = 'block';
            quizArea.style.display = 'none';
            currentQuestion = 0;
            score = 0;
            timer = 0;
            isPlaying = false;
            isGameOver = false;
            timerEl.classList.remove('countdown', 'critical');
        }

        function clearAllIntervals() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
        }

        // ============================================================
        //  彩花效果
        // ============================================================
        function launchConfetti() {
            const colors = ['#FF6B6B', '#FFD700', '#48DBFB', '#FF9FF3', '#54a0ff', '#00d2d3', '#f8a5c2', '#FFA500', '#38ef7d'];
            for (let i = 0; i < 80; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                const size = 4 + Math.random() * 6;
                el.style.width = size + 'px';
                el.style.height = size + 'px';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.left = Math.random() * 100 + '%';
                el.style.animationDuration = (3 + Math.random() * 3) + 's';
                el.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(el);
            }
            setTimeout(() => {
                document.querySelectorAll('.confetti').forEach(el => el.remove());
            }, 6000);
        }
    </script>
</body>
</html>
