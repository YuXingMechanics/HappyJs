<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>拼拼图 - 快乐学习乐园</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #gameContainer {
    position: relative;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 20px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.2);
    max-width: 98vw;
    max-height: 98vh;
    display: flex;
    flex-direction: column;
  }

  #gameTitle {
    text-align: center;
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    letter-spacing: 2px;
  }

  #topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  #topBarLeft, #topBarRight {
    display: flex;
    gap: 6px;
  }
  #topBar button {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: none;
    background: rgba(0,0,0,0.2);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    opacity: 0.8;
  }
  #topBar button:hover { opacity: 1; background: rgba(0,0,0,0.35); transform: scale(1.08); }
  #topBar button:active { transform: scale(0.92); }

  #stats {
    display: flex;
    gap: 14px;
    color: rgba(255,255,255,0.9);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    justify-content: center;
  }
  #stats span {
    background: rgba(0,0,0,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  #leftPanel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  #gameArea {
    display: flex;
    gap: 12px;
    flex: 1;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
    align-items: stretch;
  }

  #gridFrame {
    display: grid;
    gap: 0;
    background: transparent;
    flex-shrink: 0;
  }

  .slot {
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: background 0.15s;
  }
  .slot:hover {
    background: rgba(255,255,255,0.08);
  }

  #piecesPanel {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 140px;
    max-height: 100%;
    min-height: 200px;
  }

  #piecesPanel .panel-title {
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 4px;
    text-align: center;
    letter-spacing: 1px;
  }

  #piecesGrid {
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 6px;
    overflow-y: auto;
    flex: 1;
    background: rgba(0,0,0,0.12);
    border-radius: 8px;
    padding: 10px;
    min-height: 150px;
    min-width: 120px;
  }

  .piece {
    position: relative;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }
  .piece:hover {
    transform: scale(1.08);
    z-index: 2;
  }
  .piece:active {
    transform: scale(0.95);
  }
  .piece.selected {
    box-shadow: 0 0 0 3px #FFD700, 0 0 15px rgba(255,215,0,0.5);
    transform: scale(1.1);
    z-index: 3;
  }
  .piece.placed {
    display: none;
  }

  .puzzle-slice {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: visible;
    background: transparent;
  }
  .puzzle-slice img {
    display: block;
    pointer-events: none;
    object-fit: cover;
  }

  .puzzle-piece {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: visible;
    background-color: transparent;
    background-image: none;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  .puzzle-piece.selected {
    box-shadow: 
      3px 3px 15px rgba(0,0,0,0.4),
      0 0 20px rgba(255,215,0,0.3);
    z-index: 10;
  }

  #loading {
    text-align: center;
    color: #fff;
    padding: 20px;
  }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 10px auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #startOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.65);
    border-radius: 24px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 20px;
  }
  #startOverlay h2 {
    color: #fff;
    font-size: 24px;
    margin-bottom: 4px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }
  #startOverlay p {
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    margin-bottom: 12px;
  }

  #themeSelect {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #themeSelect button {
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.9);
    transition: all 0.2s;
  }
  #themeSelect button:hover {
    background: rgba(255,255,255,0.18);
    border-color: rgba(255,255,255,0.5);
  }
  #themeSelect button.active {
    background: rgba(255,215,0,0.2);
    border-color: #FFD700;
    color: #FFD700;
  }

  #sizeSelect {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    max-width: 300px;
  }
  #sizeSelect button {
    padding: 7px 14px;
    font-size: 13px;
    font-weight: bold;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 10px;
    cursor: pointer;
    background: rgba(255,255,255,0.1);
    color: #fff;
    transition: all 0.2s;
  }
  #sizeSelect button:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.6);
    transform: scale(1.05);
  }
  #sizeSelect button:active { transform: scale(0.95); }

  #overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    border-radius: 24px;
    z-index: 10;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  #overlay.show { display: flex; }
  #overlay h2 {
    color: #FFD700;
    font-size: 30px;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    margin-bottom: 8px;
  }
  #overlay p {
    color: #fff;
    font-size: 15px;
    margin-bottom: 4px;
  }
  #overlay .btn {
    margin-top: 14px;
    padding: 10px 28px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: #fff;
    box-shadow: 0 4px 15px rgba(255,215,0,0.3);
    transition: all 0.2s;
  }
  #overlay .btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255,215,0,0.5); }
  #overlay .btn:active { transform: scale(0.95); }

  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 100;
  }

  @media (max-width: 500px) {
    #gameContainer { padding: 10px; border-radius: 14px; }
    #gameTitle { font-size: 16px; margin-bottom: 4px; }
    #topBar { margin-bottom: 4px; }
    #topBar button { width: 30px; height: 30px; font-size: 14px; }
    #stats { font-size: 12px; margin-bottom: 4px; }
    #stats span { padding: 3px 8px; }
    #gameArea { gap: 6px; flex-direction: column; align-items: center; }
    #leftPanel { flex-direction: row; gap: 8px; }
    #refImage { width: 36px; height: 36px; }
    #piecesPanel { max-height: none; width: 100%; }
    #piecesGrid { max-height: 200px; }
    #startOverlay h2 { font-size: 18px; }
    #sizeSelect button { padding: 5px 10px; font-size: 12px; }
    #themeSelect button { padding: 4px 10px; font-size: 11px; }
  }
</style>
</head>
<body>

<div id="gameContainer">
  <div id="gameTitle">🧩 拼拼图</div>

const PuzzleAudio = (() => {
  let ctx = null;
  function init() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
  }
  function playTone(freq, duration, type, vol) {
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  }
  function playClick() {
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.35, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.08);
  }
  function playPlace() {
    if (!ctx) return;
    playTone(880, 0.05, 'sine', 0.3);
    setTimeout(() => playTone(1100, 0.1, 'sine', 0.25), 30);
  }
  function playRemove() {
    if (!ctx) return;
    playTone(440, 0.08, 'triangle', 0.25);
    setTimeout(() => playTone(330, 0.1, 'triangle', 0.2), 40);
  }
  function playVictory() {
    if (!ctx) return;
    const notes = [523, 659, 784, 1047, 1318, 1047, 784, 659, 523];
    notes.forEach((f, i) => setTimeout(() => playTone(f, 0.25, 'sine', 0.4), i * 100));
    setTimeout(() => {
      [523, 659, 784, 1047, 1318].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'sine', 0.3), i * 80));
    }, notes.length * 100 + 200);
  }
  return {
    init() { init(); },
    select() { init(); playClick(); },
    place() { init(); playPlace(); },
    remove() { init(); playRemove(); },
    victory() { init(); playVictory(); }
  };
})();

function generateThemeImage(size) {
  const c = document.createElement('canvas');
  c.width = size;
  c.height = size;
  const ctx = c.getContext('2d');

  function drawGradientBackground(bgColors) {
    const grad = ctx.createLinearGradient(0, 0, size, size);
    grad.addColorStop(0, bgColors[0]);
    if (bgColors.length === 3) {
      grad.addColorStop(0.5, bgColors[1]);
      grad.addColorStop(1, bgColors[2]);
    } else {
      grad.addColorStop(1, bgColors[1]);
    }
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
  }

  function drawSun(x, y, r) {
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = r * 0.15;
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const x1 = x + Math.cos(angle) * r * 1.3;
      const y1 = y + Math.sin(angle) * r * 1.3;
      const x2 = x + Math.cos(angle) * r * 1.6;
      const y2 = y + Math.sin(angle) * r * 1.6;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }
  }

  function drawCloud(x, y, s) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x, y, s, 0, Math.PI*2);
    ctx.arc(x + s * 0.8, y - s * 0.2, s * 0.8, 0, Math.PI*2);
    ctx.arc(x + s * 1.6, y, s * 0.9, 0, Math.PI*2);
    ctx.fill();
  }

  function drawTree(x, y, h) {
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(x - h * 0.08, y, h * 0.16, h * 0.3);
    ctx.fillStyle = '#228B22';
    ctx.beginPath();
    ctx.moveTo(x, y - h);
    ctx.lineTo(x - h * 0.4, y - h * 0.3);
    ctx.lineTo(x + h * 0.4, y - h * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x, y - h * 0.7);
    ctx.lineTo(x - h * 0.5, y);
    ctx.lineTo(x + h * 0.5, y);
    ctx.closePath();
    ctx.fill();
  }

  function drawGrass() {
    const grassH = size * 0.2;
    for (let i = 0; i < size; i += grassH * 0.2) {
      const gw = grassH * 0.12 + Math.random() * grassH * 0.08;
      const gh = grassH * 0.4 + Math.random() * grassH * 0.2;
      ctx.fillStyle = '#32CD32';
      ctx.beginPath();
      ctx.moveTo(i, size - grassH);
      ctx.quadraticCurveTo(i + gw * 0.5, size - grassH - gh, i + gw, size - grassH);
      ctx.fill();
    }
  }

      { name: 'forest', bg: ['#2E7D32', '#81C784', '#FFD54F'], emoji: ['🇺🇸', '🇫🇷', '🇩🇪', '🇮🇹', '🇧🇷', '🇷🇺'], decor: 'forest' },
      { name: 'candy', bg: ['#FFCDD2', '#FFEE58', '#E91E63'], emoji: ['🇯🇵', '🇹🇭', '🇮🇳', '🇪🇸', '🇵🇹', '🇳🇱'], decor: 'candy' },
      { name: 'fire', bg: ['#FFECB3', '#FF7043', '#9C27B0'], emoji: ['🇨🇳', '🇺🇸', '🇯🇵', '🇬🇧', '🇫🇷', '🇩🇪'], decor: 'fire' },
      { name: 'ice', bg: ['#E0F7FA', '#45B7D1', '#FF7043'], emoji: ['🇰🇷', '🇹🇭', '🇮🇳', '🇨🇦', '🇦🇺', '🇮🇹'], decor: 'ice' }
    ];
    const scene = scenes[Math.floor(Math.random() * scenes.length)];
    drawGradientBackground(scene.bg);



    if (scene.decor === 'space') {
      for (let i = 0; i < 20; i++) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(Math.random() * size, Math.random() * size, size * 0.005 + Math.random() * size * 0.015, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (scene.decor === 'garden') {
      for (let i = 0; i < 6; i++) {
        ctx.fillStyle = ['#FF69B4', '#FF1493', '#FFD700', '#FFA500'][Math.floor(Math.random() * 4)];
        ctx.beginPath();
        ctx.arc(Math.random() * size, size * 0.5 + Math.random() * size * 0.4, size * 0.025, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (scene.decor === 'ocean') {
      for (let i = 0; i < 4; i++) {
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        const wx = Math.random() * size;
        const wy = Math.random() * size;
        ctx.moveTo(wx, wy);
        ctx.quadraticCurveTo(wx + size * 0.12, wy - size * 0.02, wx + size * 0.24, wy);
        ctx.stroke();
      }
    } else if (scene.decor === 'desert') {
      for (let i = 0; i < 3; i++) {
        ctx.fillStyle = '#E65100';
        ctx.beginPath();
        const sx = Math.random() * size;
        const sy = size * 0.5 + Math.random() * size * 0.4;
        ctx.moveTo(sx - size * 0.12, sy);
        ctx.quadraticCurveTo(sx, sy - size * 0.1, sx + size * 0.12, sy);
        ctx.lineTo(sx + size * 0.12, sy + size * 0.06);
        ctx.quadraticCurveTo(sx, sy + size * 0.03, sx - size * 0.12, sy + size * 0.06);
        ctx.closePath();
        ctx.fill();
      }
    } else if (scene.decor === 'forest') {
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = '#2E7D32';
        ctx.beginPath();
        ctx.arc(Math.random() * size, size * 0.7 + Math.random() * size * 0.2, size * 0.04 + Math.random() * size * 0.04, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (scene.decor === 'candy') {
      for (let i = 0; i < 5; i++) {
        ctx.fillStyle = ['#FFD700', '#00BCD4', '#FF5722', '#9C27B0'][Math.floor(Math.random() * 4)];
        ctx.beginPath();
        ctx.arc(Math.random() * size, Math.random() * size, size * 0.03 + Math.random() * size * 0.03, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (scene.decor === 'fire') {
      for (let i = 0; i < 4; i++) {
        ctx.fillStyle = `rgba(255, ${Math.floor(Math.random()*80)}, 0, 0.3)`;
        ctx.beginPath();
        ctx.arc(Math.random() * size, size * 0.6 + Math.random() * size * 0.3, size * 0.04 + Math.random() * size * 0.04, 0, Math.PI*2);
        ctx.fill();
      }
    } else if (scene.decor === 'ice') {
      for (let i = 0; i < 5; i++) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(Math.random() * size, Math.random() * size, size * 0.02 + Math.random() * size * 0.02, 0, Math.PI*2);
        ctx.fill();
      }
    }

    const shuffledEmoji = scene.emoji.sort(() => Math.random() - 0.5);
    const cols = 3;
    const rows = 2;
    const cellW = size / cols;
    const cellH = size * 0.6 / rows;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        const x = c * cellW + cellW / 2;
        const y = size * 0.2 + r * cellH + cellH / 2;
        drawEmoji(x, y, shuffledEmoji[idx], size * 0.18);
      }
    }

    const patternCount = Math.floor(Math.random() * 5) + 3;
    for (let i = 0; i < patternCount; i++) {
      const px = Math.random() * size * 0.8 + size * 0.1;
      const py = Math.random() * size * 0.5 + size * 0.2;
      const ps = size * 0.02 + Math.random() * size * 0.04;
      const patterns = ['circle', 'diamond', 'triangle'];
      const pType = patterns[Math.floor(Math.random() * patterns.length)];
      if (pType === 'circle') drawPatternCircle(px, py, ps, `rgba(${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, 0.3)`);
      else if (pType === 'diamond') drawPatternDiamond(px, py, ps, `rgba(${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, 0.3)`);
      else drawPatternTriangle(px, py, ps, `rgba(${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, ${Math.floor(Math.random()*255)}, 0.3)`);
    }
  }

  return c.toDataURL('image/jpeg', 0.9);
}

function calcSizes() {
  const padding = window.innerWidth <= 500 ? 16 : 32;
  const availW = window.innerWidth - padding;
  const overheadH = window.innerHeight <= 600 ? 110 : 150;
  const availH = window.innerHeight - overheadH;

  const isNarrow = window.innerWidth <= 560;
  const gridMaxW = Math.floor(isNarrow ? Math.min(availW * 0.72, 350) : Math.min(availW * 0.5, 350));
  const gridMaxH = Math.floor(Math.min(availH * 0.8, 350));

  const gap = 0;
  const maxDim = Math.min(gridMaxW, gridMaxH);

  const minPiece = gridSize >= 15 ? 8 : (gridSize >= 10 ? 12 : 15);
  let bestPiece = minPiece;
  let bestBoard = 0;
  for (let ps = minPiece; ps <= 100; ps++) {
    const bp = ps * gridSize + (gridSize - 1) * gap + 8;
    if (bp <= maxDim) { bestPiece = ps; bestBoard = bp; }
    else break;
  }
  pieceSize = bestPiece;
  const boardPx = bestBoard;

  const maxThumb = Math.min(pieceSize * 0.85, 50);
  const minThumb = gridSize >= 15 ? 12 : 20;
  
  if (isNarrow) {
    const thumbAreaW = Math.max(availW - 12, 80);
    const cols = Math.min(Math.floor(thumbAreaW / minThumb), gridSize >= 15 ? 8 : 6);
    thumbSize = Math.max(Math.min(Math.floor(thumbAreaW / cols), maxThumb), minThumb);
  } else {
    const remainW = availW - boardPx - 16;
    const thumbAreaW = Math.max(remainW, 80);
    const cols = Math.min(Math.floor(thumbAreaW / minThumb), 5);
    thumbSize = Math.max(Math.min(Math.floor(thumbAreaW / cols), maxThumb), minThumb);
  }

  return { gap, boardPx, slotSize: pieceSize };
}

function applyBoardStyle() {
  const { gap, boardPx } = calcSizes();
  boardEl.style.gridTemplateColumns = `repeat(${gridSize}, ${pieceSize}px)`;
  boardEl.style.gridTemplateRows = `repeat(${gridSize}, ${pieceSize}px)`;
  boardEl.style.gap = gap + 'px';
  boardEl.style.width = boardPx + 'px';
  boardEl.style.minWidth = boardPx + 'px';
}

function createSliceEl(containerSize, row, col, isSlot) {
  const el = document.createElement('div');
  el.className = 'puzzle-piece';
  el.style.width = containerSize + 'px';
  el.style.height = containerSize + 'px';

  const k = Math.max(6, Math.floor(containerSize * 0.2));
  const s = containerSize;
  const cx = s / 2;
  const cy = s / 2;

  const isTop = row === 0;
  const isBottom = row === gridSize - 1;
  const isLeft = col === 0;
  const isRight = col === gridSize - 1;
  const evenCol = col % 2 === 0;
  const evenRow = row % 2 === 0;

  const hasTopKnob = !isTop && evenCol;
  const hasBottomKnob = !isBottom && !evenCol;
  const hasLeftKnob = !isLeft && !evenRow;
  const hasRightKnob = !isRight && evenRow;

  function pct(v) { return (v / s) * 100; }

  const points = [];

  points.push(`${pct(0)} ${pct(0)}`);
  points.push(`${pct(cx - k)} ${pct(0)}`);

  if (!isTop) {
    if (hasTopKnob) {
      points.push(`${pct(cx - k)} ${pct(-k)}`);
      points.push(`${pct(cx)} ${pct(-k)}`);
      points.push(`${pct(cx + k)} ${pct(-k)}`);
    } else {
      points.push(`${pct(cx - k)} ${pct(k)}`);
      points.push(`${pct(cx)} ${pct(k)}`);
      points.push(`${pct(cx + k)} ${pct(k)}`);
    }
  }
  points.push(`${pct(cx + k)} ${pct(0)}`);

  points.push(`${pct(s)} ${pct(0)}`);
  points.push(`${pct(s)} ${pct(cy - k)}`);

  if (!isRight) {
    if (hasRightKnob) {
      points.push(`${pct(s + k)} ${pct(cy - k)}`);
      points.push(`${pct(s + k)} ${pct(cy)}`);
      points.push(`${pct(s + k)} ${pct(cy + k)}`);
    } else {
      points.push(`${pct(s - k)} ${pct(cy - k)}`);
      points.push(`${pct(s - k)} ${pct(cy)}`);
      points.push(`${pct(s - k)} ${pct(cy + k)}`);
    }
  }
  points.push(`${pct(s)} ${pct(cy + k)}`);

  points.push(`${pct(s)} ${pct(s)}`);
  points.push(`${pct(cx + k)} ${pct(s)}`);

  if (!isBottom) {
    if (hasBottomKnob) {
      points.push(`${pct(cx + k)} ${pct(s + k)}`);
      points.push(`${pct(cx)} ${pct(s + k)}`);
      points.push(`${pct(cx - k)} ${pct(s + k)}`);
    } else {
      points.push(`${pct(cx + k)} ${pct(s - k)}`);
      points.push(`${pct(cx)} ${pct(s - k)}`);
      points.push(`${pct(cx - k)} ${pct(s - k)}`);
    }
  }
  points.push(`${pct(cx - k)} ${pct(s)}`);

  points.push(`${pct(0)} ${pct(s)}`);
  points.push(`${pct(0)} ${pct(cy + k)}`);

  if (!isLeft) {
    if (hasLeftKnob) {
      points.push(`${pct(-k)} ${pct(cy + k)}`);
      points.push(`${pct(-k)} ${pct(cy)}`);
      points.push(`${pct(-k)} ${pct(cy - k)}`);
    } else {
      points.push(`${pct(k)} ${pct(cy + k)}`);
      points.push(`${pct(k)} ${pct(cy)}`);
      points.push(`${pct(k)} ${pct(cy - k)}`);
    }
  }
  points.push(`${pct(0)} ${pct(cy - k)}`);

  el.style.clipPath = `polygon(${points.join(',')})`;
  el.style.backgroundImage = `url(${refImgUrl})`;
  el.style.backgroundSize = `${gridSize * 100}% ${gridSize * 100}%`;
  el.style.backgroundPosition = `${col * (100 / (gridSize - 1))}% ${row * (100 / (gridSize - 1))}%`;

  return el;
}

function renderFrame() {
  boardEl.innerHTML = '';
  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.dataset.row = r;
      slot.dataset.col = c;
      slot.style.width = pieceSize + 'px';
      slot.style.height = pieceSize + 'px';
      slot.style.overflow = 'hidden';

      if (placed[r][c]) {
        const piece = placed[r][c];
        slot.appendChild(createSliceEl(pieceSize, piece.row, piece.col, true));
      }
      boardEl.appendChild(slot);
    }
  }
}

function renderPieces() {
  piecesGrid.innerHTML = '';

  shuffledIds.forEach(id => {
    const p = pieces[id];
    let isPlaced = false;
    for (let r = 0; r < gridSize; r++) {
      for (let c = 0; c < gridSize; c++) {
        if (placed[r][c] && placed[r][c].id === id) {
          isPlaced = true;
          break;
        }
      }
      if (isPlaced) break;
    }
    if (isPlaced) return;

    const el = document.createElement('div');
    el.className = 'piece';
    el.dataset.id = id;
    el.style.width = thumbSize + 'px';
    el.style.height = thumbSize + 'px';
    el.style.borderRadius = '4px';

    if (id === selectedId) el.classList.add('selected');

    el.appendChild(createSliceEl(thumbSize, p.row, p.col, false));
    piecesGrid.appendChild(el);
  });
}

function render() {
  renderFrame();
  renderPieces();
  placedCountEl.textContent = countPlaced();
  totalCountEl.textContent = totalPieces;
}

function countPlaced() {
  let n = 0;
  for (let r = 0; r < gridSize; r++)
    for (let c = 0; c < gridSize; c++)
      if (placed[r][c]) n++;
  return n;
}

function isComplete() {
  if (countPlaced() !== totalPieces) return false;
  for (let r = 0; r < gridSize; r++) {
    for (let c = 0; c < gridSize; c++) {
      const p = placed[r][c];
      if (!p || p.row !== r || p.col !== c) return false;
    }
  }
  return true;
}

function shuffleIds() {
  for (let i = shuffledIds.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledIds[i], shuffledIds[j]] = [shuffledIds[j], shuffledIds[i]];
  }
}

function onPieceClick(id) {
  if (!isPlaying) return;
  if (selectedId === id) {
    selectedId = -1;
    renderPieces();
    return;
  }
  selectedId = id;
  PuzzleAudio.select();
  renderPieces();
}

function onSlotClick(row, col) {
  if (!isPlaying) return;

  if (placed[row][col]) {
    placed[row][col] = null;
    PuzzleAudio.remove();
    selectedId = -1;
    render();
    return;
  }

  if (selectedId === -1) return;

  const p = pieces[selectedId];
  placed[row][col] = p;
  selectedId = -1;
  PuzzleAudio.place();
  render();

  if (isComplete()) {
    onVictory();
  }
}

boardEl.addEventListener('click', (e) => {
  if (!isPlaying) return;
  const slot = e.target.closest('.slot');
  if (!slot) return;
  const row = parseInt(slot.dataset.row);
  const col = parseInt(slot.dataset.col);
  if (isNaN(row) || isNaN(col)) return;
  onSlotClick(row, col);
});

piecesGrid.addEventListener('click', (e) => {
  if (!isPlaying) return;
  const piece = e.target.closest('.piece');
  if (!piece) return;
  const id = parseInt(piece.dataset.id);
  if (isNaN(id)) return;
  onPieceClick(id);
});

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject();
    img.src = url;
  });
}

async function startGame(size) {
  PuzzleAudio.init();
  startOverlay.style.display = 'none';
  boardEl.innerHTML = '<div id="loading"><div class="spinner"></div><p>正在生成图片...</p></div>';

  gridSize = size;
  totalPieces = size * size;
  timer = 0;
  isPlaying = false;
  isStarted = false;
  selectedId = -1;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

  overlay.classList.remove('show');

  placed = [];
  for (let r = 0; r < gridSize; r++) {
    placed[r] = [];
    for (let c = 0; c < gridSize; c++) {
      placed[r][c] = null;
    }
  }

  pieces = [];
  for (let i = 0; i < totalPieces; i++) {
    const r = Math.floor(i / gridSize);
    const c = i % gridSize;
    pieces.push({ id: i, row: r, col: c });
  }

  shuffledIds = pieces.map(p => p.id);
  shuffleIds();

  const sizePx = Math.max(512, gridSize * 80);
  refImgUrl = generateThemeImage(sizePx);
  console.log('Canvas theme image generated for:', currentTheme);

  applyBoardStyle();
  render();

  isStarted = true;
  isPlaying = true;
  timer = 0;
  timerEl.textContent = '0';
  timerInterval = setInterval(() => {
    timer++;
    timerEl.textContent = timer;
  }, 1000);
}

function restartGame() {
  startGame(gridSize);
}

function onVictory() {
  isPlaying = false;
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  PuzzleAudio.victory();
  finalStats.textContent = `${gridSize}×${gridSize} · 用时 ${timer} 秒`;
  overlay.classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#FF6B6B', '#FFD700', '#48DBFB', '#FF9FF3', '#54a0ff', '#00d2d3', '#f8a5c2', '#FFA500', '#38ef7d'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    const size = 4 + Math.random() * 6;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.left = (20 + Math.random() * 60) + 'vw';
    el.style.top = '-10px';
    el.style.opacity = '1';
    document.body.appendChild(el);

    const angle = Math.random() * Math.PI;
    const velocity = 150 + Math.random() * 200;
    const vx = Math.cos(angle) * velocity;
    const vy = Math.sin(angle) * velocity;
    const duration = 1 + Math.random();

    el.style.transition = `top ${duration}s ease-in, left ${duration}s ease-out, opacity ${duration}s ease-out`;
    setTimeout(() => {
      el.style.top = '110vh';
      el.style.left = (parseFloat(el.style.left) + vx) + 'px';
      el.style.opacity = '0';
    }, 10);
    setTimeout(() => el.remove(), duration * 1000);
  }
}

document.getElementById('shuffleBtn').addEventListener('click', () => {
  if (!isPlaying) return;
  for (let r = 0; r < gridSize; r++)
    for (let c = 0; c < gridSize; c++)
      placed[r][c] = null;
  shuffleIds();
  selectedId = -1;
  render();
});

document.getElementById('fullscreenBtn').addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(e => {});
  } else {
    document.exitFullscreen();
  }
});
